<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#fff;--bg2:#f5f5f0;--bg3:#eeecea;--bgi:#e6f1fb;--bgd:#fcebeb;--bgs:#eaf3de;--bgw:#faeeda;
--tx:#1a1a1a;--tx2:#5f5e5a;--tx3:#888780;--txi:#185fa5;--txd:#a32d2d;--txs:#3b6d11;--txw:#854f0b;
--bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--bd3:rgba(0,0,0,.32);
--bdi:#b5d4f4;--bdd:#f7c1c1;--bds:#c0dd97;--bdw:#fac775;
--r:8px;--R:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
@media(prefers-color-scheme:dark){:root{
--bg:#1e1e1c;--bg2:#2a2a27;--bg3:#242421;--bgi:#0c447c22;--bgd:#79202044;--bgs:#27500a33;--bgw:#63380644;
--tx:#e8e6df;--tx2:#b4b2a9;--tx3:#888780;--txi:#85b7eb;--txd:#f09595;--txs:#97c459;--txw:#ef9f27;
--bd:rgba(255,255,255,.10);--bd2:rgba(255,255,255,.18);--bd3:rgba(255,255,255,.28)}}
body{font-family:var(--font);background:var(--bg3);color:var(--tx);font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
/* sidebar */
.sb{width:220px;min-width:220px;background:var(--bg);border-right:.5px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;transition:transform .25s;z-index:200}
.sb-logo{padding:16px;border-bottom:.5px solid var(--bd)}
.sb-logoname{font-size:12px;color:var(--tx2);margin-top:4px}
.sb-logoph{font-size:17px;font-weight:600}
.sb-logoimg{width:100%;max-height:44px;object-fit:contain;display:none;margin-bottom:4px}
.sb-sec{padding:8px 0}
.sb-lbl{font-size:10px;font-weight:600;color:var(--tx3);padding:4px 16px;text-transform:uppercase;letter-spacing:.6px}
.sb-item{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--tx2);border-left:2px solid transparent;transition:all .15s}
.sb-item:hover{background:var(--bg2);color:var(--tx)}
.sb-item.active{color:var(--tx);background:var(--bg2);border-left-color:var(--tx)}
.sb-ico{font-size:14px;width:18px;text-align:center}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
.sb-overlay.on{display:block}
/* main */
.mn{flex:1;overflow:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--bg);border-bottom:.5px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar-ttl{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-act{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.hbtn{display:none;background:none;border:.5px solid var(--bd2);border-radius:var(--r);padding:6px 9px;cursor:pointer;color:var(--tx);font-size:18px;line-height:1}
.content{padding:16px;flex:1}
.sb-user{padding:12px 16px;margin-top:auto;border-top:.5px solid var(--bd)}
/* buttons */
.btn{border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);padding:6px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-family:var(--font)}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--tx);color:var(--bg);border-color:var(--tx)}.btn-p:hover{opacity:.85}
.btn-d{color:var(--txd);border-color:var(--bdd)}.btn-d:hover{background:var(--bgd)}
.btn-s{color:var(--txs);border-color:var(--bds)}.btn-s:hover{background:var(--bgs)}
.btn-sm{padding:4px 8px;font-size:12px}
/* layout */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--R);padding:16px;margin-bottom:12px}
.stat{background:var(--bg2);border-radius:var(--r);padding:14px}
.stat-lbl{font-size:12px;color:var(--tx2);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600}
.sec-ttl{font-size:13px;font-weight:600;margin-bottom:12px}
/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.b-urgente{background:var(--bgd);color:var(--txd)}.b-ejecutar{background:var(--bgw);color:var(--txw)}
.b-posterior{background:var(--bg2);color:var(--tx2)}.b-ejecucion{background:var(--bgi);color:var(--txi)}
.b-terminado{background:var(--bgs);color:var(--txs)}.b-porEjecutar{background:var(--bg2);color:var(--tx2)}
.b-pagado{background:var(--bgs);color:var(--txs)}.b-pendiente{background:var(--bgd);color:var(--txd)}
.b-cuotas{background:var(--bgw);color:var(--txw)}
/* fields */
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.fld input,.fld select,.fld textarea,.inp{width:100%;padding:7px 10px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:13px;font-family:var(--font)}
.fld input:focus,.fld select:focus,.fld textarea:focus,.inp:focus{outline:none;border-color:var(--bd3)}
.fld textarea{min-height:72px;resize:vertical}
/* table */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-weight:600;font-size:11px;color:var(--tx2);text-align:left;padding:8px 10px;border-bottom:.5px solid var(--bd);text-transform:uppercase;letter-spacing:.3px}
td{padding:9px 10px;border-bottom:.5px solid var(--bd);color:var(--tx)}
tr:hover td{background:var(--bg2)}
tr.urg td:first-child{border-left:3px solid var(--txd)}
tr.eje td:first-child{border-left:3px solid var(--txw)}
tr.pos td:first-child{border-left:3px solid var(--bd)}
/* modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:1000;overflow-y:auto}
.modal{background:var(--bg);border-radius:var(--R);border:.5px solid var(--bd);width:100%;max-width:700px;padding:24px;margin:auto}
.mhdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:.5px solid var(--bd)}
.mttl{font-size:16px;font-weight:600}
.xbtn{background:none;border:none;cursor:pointer;color:var(--tx2);font-size:24px;padding:0 4px;line-height:1}
/* tabs */
.tabs{display:flex;gap:4px;padding-bottom:14px;border-bottom:.5px solid var(--bd);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;color:var(--tx2);border:.5px solid transparent;transition:all .15s}
.tab:hover{background:var(--bg2)}
.tab.on{background:var(--bg2);color:var(--tx);border-color:var(--bd)}
/* misc */
.chk-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--bd)}
.chk-row label{flex:1;font-size:13px;cursor:pointer}
.chk-row.done label{text-decoration:line-through;color:var(--tx3)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-sumaugencia{background:#c0000a}.dot-urgente{background:#e24b4a}.dot-ejecutar{background:#ef9f27}.dot-paralizado{background:#888}.dot-posterior{background:var(--bd2)}
.b-paralizado{background:#e8e8e8;color:#555}.b-sumaugencia{background:#fcebeb;color:#a32d2d;border:1px solid #f7c1c1}
.empty{text-align:center;padding:40px;color:var(--tx3);font-size:13px}
.hr{border:none;border-top:.5px solid var(--bd);margin:16px 0}
.row{display:flex;gap:8px;align-items:center}
.f1{flex:1}
.tx2{color:var(--tx2)}.tsm{font-size:12px}.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:16px}.mb2{margin-bottom:8px}.mb3{margin-bottom:16px}
.hidden{display:none!important}
.cloud-a,.cloud-d,.cloud-n{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--r);font-size:11px;font-weight:600;text-decoration:none;cursor:pointer}
.cloud-a{background:#e8f4fd;color:#1a73e8;border:.5px solid #b8d4f8}
.cloud-d{background:#e8f0fb;color:#0061ff;border:.5px solid #aac4f8}
.cloud-n{background:var(--bg2);color:var(--tx3);border:.5px solid var(--bd)}
.cod{font-family:monospace;font-size:11px;background:var(--bg2);padding:2px 6px;border-radius:4px;cursor:pointer}
/* mobile */
@media(max-width:768px){
.sb{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.15)}
.sb.open{transform:translateX(0)}
.hbtn{display:flex;align-items:center;justify-content:center}
.content{padding:12px}
.g2,.g3,.g4{grid-template-columns:1fr}
.g4{grid-template-columns:1fr 1fr}
.mov{padding:0;align-items:flex-end}
.modal{border-radius:var(--R) var(--R) 0 0;max-height:92vh;overflow-y:auto;max-width:100%}
th,td{padding:7px 8px;font-size:12px}}
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDlGzpRzA4ze5TSMyGwTxREs1sPPZR6DZg",
  authDomain: "mi-planer-8801c.firebaseapp.com",
  projectId: "mi-planer-8801c",
  storageBucket: "mi-planer-8801c.firebasestorage.app",
  messagingSenderId: "243910049708",
  appId: "1:243910049708:web:a73b9bad428d2171e08409"
};
firebase.initializeApp(firebaseConfig);
const _db = firebase.firestore();
const _ARQ_DOC = _db.collection("arqgestion").doc("estudio_modulo_sur");

window._arqSave = function(data) {
  return _ARQ_DOC.set({ payload: JSON.stringify(data) }).catch(function(e){
    console.error("Error guardando ARQ:", e);
  });
};
window._arqLoad = function() {
  return _ARQ_DOC.get().then(function(snap) {
    if (snap.exists) return JSON.parse(snap.data().payload);
    return null;
  }).catch(function(e){ return null; });
};
window._arqListen = function(callback) {
  return _ARQ_DOC.onSnapshot(function(snap) {
    if (snap.exists) {
      try { callback(JSON.parse(snap.data().payload)); } catch(e) {}
    }
  });
};
window._arqFirebaseReady = true;
window.dispatchEvent(new Event("arq-firebase-ready"));
</script>
</head>
<body>
<div class="app">
  <div class="sb" id="SB">
    <div class="sb-logo">
      <img class="sb-logoimg" id="LOGO" src="" alt="">
      <div class="sb-logoph" id="LOGOPH">ARQ<span style="font-weight:300;color:var(--tx2)">gestión</span></div>
      <div class="sb-logoname" id="EMPNM">Mi Estudio de Arquitectura</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Principal</div>
      <div class="sb-item" data-v="dashboard" onclick="go('dashboard')"><span class="sb-ico">◈</span>Dashboard</div>
      <div class="sb-item" data-v="proyectos" onclick="go('proyectos')"><span class="sb-ico">⊟</span>Proyectos</div>
      <div class="sb-item" data-v="buscador" onclick="go('buscador')"><span class="sb-ico">⊕</span>Buscador</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Datos</div>
      <div class="sb-item" data-v="clientes" onclick="go('clientes')"><span class="sb-ico">⊡</span>Clientes</div>
      <div class="sb-item" data-v="tramites" onclick="go('tramites')"><span class="sb-ico">⊞</span>Trámites</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Informes</div>
      <div class="sb-item" data-v="informes" onclick="go('informes')"><span class="sb-ico">⊘</span>Informes / PDF</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Finanzas</div>
      <div class="sb-item" data-v="presupuestos" onclick="go('presupuestos')"><span class="sb-ico">⊛</span>Presupuestos</div>
      <div class="sb-item" data-v="honorarios" onclick="go('honorarios')"><span class="sb-ico">⊜</span>Honorarios</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Sistema</div>
      <div class="sb-item" data-v="config" onclick="go('config')"><span class="sb-ico">⊗</span>Configuración</div>
    </div>
    <div id="arq-sync" style="font-size:10px;color:#3b6d11;padding:4px 16px;text-align:center;border-bottom:.5px solid var(--bd)">✓ Sincronizado</div>
<div class="sb-user">
      <div class="tsm tx2 mb2">Usuario activo:</div>
      <select id="USEL" onchange="setUser(this.value)" class="inp" style="width:100%">
        <option value="u1">Usuario 1</option>
        <option value="u2">Usuario 2</option>
      </select>
    </div>
  </div>
  <div class="sb-overlay" id="OV" onclick="closeSB()"></div>
  <div class="mn">
    <div class="topbar">
      <button class="hbtn" onclick="toggleSB()">&#9776;</button>
      <div class="topbar-ttl" id="PTTL">Dashboard</div>
      <div class="topbar-act" id="PACT"></div>
    </div>
    <div class="content" id="MAIN"></div>
  </div>
  <div id="MOD"></div>
</div>
<script>
// ── Storage ──
var CU='u1';
function rdb(k,d){try{var v=localStorage.getItem('arq_'+CU+'_'+k);return v?JSON.parse(v):d}catch(e){return d}}
function wdb(k,v){
  localStorage.setItem('arq_'+CU+'_'+k,JSON.stringify(v));
  // Sync a Firebase con debounce
  clearTimeout(window._arqSaveTimer);
  window._arqSaveTimer=setTimeout(function(){_arqPushToFirebase();},800);
}
function _arqGetAllData(){
  var keys=['proyectos','clientes','tramites','presupuestos','config',
            'profNombre','profProfesion','profTelefono','profEmail'];
  var data={logo:localStorage.getItem('arq_logo')||''};
  ['u1','u2'].forEach(function(u){
    keys.forEach(function(k){
      var v=localStorage.getItem('arq_'+u+'_'+k);
      if(v)data[u+'_'+k]=v;
    });
    var un=localStorage.getItem('arq_'+u+'_UN');
    if(un)data[u+'_UN']=un;
  });
  return data;
}
function _arqApplyData(data){
  if(!data)return;
  var keys=['proyectos','clientes','tramites','presupuestos','config',
            'profNombre','profProfesion','profTelefono','profEmail'];
  ['u1','u2'].forEach(function(u){
    keys.forEach(function(k){
      if(data[u+'_'+k]!==undefined)localStorage.setItem('arq_'+u+'_'+k,data[u+'_'+k]);
    });
    if(data[u+'_UN'])localStorage.setItem('arq_'+u+'_UN',data[u+'_UN']);
  });
  if(data.logo){localStorage.setItem('arq_logo',data.logo);loadLogo();}
}
var _arqSkipNext=false;
function _arqPushToFirebase(){
  if(!window._arqSave)return;
  _arqSkipNext=true;
  window._arqSave(_arqGetAllData()).then(function(){
    showSyncARQ('saved');
    setTimeout(function(){_arqSkipNext=false;},8000);
  }).catch(function(){showSyncARQ('offline');_arqSkipNext=false;});
  showSyncARQ('saving');
}
function showSyncARQ(st){
  var el=document.getElementById('arq-sync');
  if(!el)return;
  if(st==='saving'){el.textContent='☁ Guardando…';el.style.color='#f0a500';}
  else if(st==='saved'){el.textContent='✓ Sincronizado';el.style.color='#3b6d11';}
  else if(st==='offline'){el.textContent='⚠ Sin conexión';el.style.color='#a32d2d';}
}
function _arqInitFirebase(){
  if(!window._arqLoad)return;
  showSyncARQ('saving');
  window._arqLoad().then(function(data){
    if(data){_arqApplyData(data);}
    showSyncARQ('saved');
    // Escuchar cambios en tiempo real
    window._arqListen(function(data){
      if(_arqSkipNext){return;}
      var openModal=document.querySelector('.modal.active,.modal[style*="flex"]');
      if(openModal){return;}
      _arqApplyData(data);
      go(CV);
      showSyncARQ('saved');
    });
  }).catch(function(){showSyncARQ('offline');});
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fmt(n){return Number(n||0).toLocaleString('es-CL')}
function stEst(e){return{ejecucion:'En ejecución',terminado:'Terminado',porEjecutar:'Por ejecutar'}[e]||'Por ejecutar'}
function stPago(e){return{pagado:'Pagado',pendiente:'Pendiente',cuotas:'En cuotas'}[e]||'Pendiente'}
function stUrg(e){return{sumaugencia:'Suma urgencia',urgente:'Urgente',ejecutar:'Por ejecutar',paralizado:'Paralizado',posterior:'Posterior'}[e]||'Posterior'}

function setUser(u){CU=u;go(CV);}
// Iniciar Firebase sync al cargar
(function(){
  function startARQ(){
    // Cargar desde localStorage primero (inmediato)
    go(CV);
    // Luego sincronizar con Firebase
    if(window._arqFirebaseReady){_arqInitFirebase();}
    else{window.addEventListener('arq-firebase-ready',_arqInitFirebase,{once:true});}
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',startARQ);
  } else {
    startARQ();
  }
})();

// ── Sidebar mobile ──
function toggleSB(){
  var sb=document.getElementById('SB'),ov=document.getElementById('OV');
  if(sb.classList.contains('open')){closeSB()}else{sb.classList.add('open');ov.classList.add('on')}
}
function closeSB(){
  document.getElementById('SB').classList.remove('open');
  document.getElementById('OV').classList.remove('on');
}

// ── Navigation ──
var CV='dashboard';
var TITLES={dashboard:'Dashboard',proyectos:'Proyectos',buscador:'Buscador / Base de datos',clientes:'Clientes',tramites:'Tipos de Trámites',informes:'Informes / PDF',presupuestos:'Presupuestos',honorarios:'Honorarios',config:'Configuración'};
function go(v){
  if(window.innerWidth<=768)closeSB();
  CV=v;
  document.querySelectorAll('.sb-item').forEach(function(n){n.classList.remove('active')});
  var el=document.querySelector('.sb-item[data-v="'+v+'"]');
  if(el)el.classList.add('active');
  document.getElementById('PTTL').textContent=TITLES[v]||v;
  document.getElementById('PACT').innerHTML='';
  document.getElementById('MAIN').innerHTML='';
  ({dashboard:vDash,proyectos:vProys,buscador:vBusc,clientes:vClis,tramites:vTrams,informes:vInformes,presupuestos:vPres,honorarios:vHon,config:vConf})[v]&&({dashboard:vDash,proyectos:vProys,buscador:vBusc,clientes:vClis,tramites:vTrams,informes:vInformes,presupuestos:vPres,honorarios:vHon,config:vConf})[v]();
}

// ── Default tramites ──
function defTrams(){return[
  {id:'t1',nombre:'Permiso de edificación',desc:'Tramitación para construcción nueva',chk:['Formulario único de edificación','Planos de arquitectura firmados','Cálculo estructural','Especificaciones técnicas','Presupuesto de obra','Certificado de informaciones previas','Escritura vigente','Certificado de gravámenes']},

// ── Code generation ──
function genCod(tramite,cliente){
  var tmap={'Permiso de edificación':'PEON','Ampliación':'AMP','Ampliación obra menor':'AMPOM','Regularización Ley 20898 hasta 90':'REG90','Regularización Ley 20898 hasta 140':'REG140','Regularización obra menor antes':'REG59','Regularización de microempresas':'REGME','Obra menor':'OM','Fusión':'FUS','Subdivisión':'SUB'};
  var ct='PROY';
  for(var k in tmap){if(tramite&&tramite.indexOf(k)>=0){ct=tmap[k];break}}
  if(ct==='PROY'&&tramite){ct=tramite.split(' ').map(function(w){return w[0]||''}).join('').toUpperCase().slice(0,6)}
  var cc='CLI';
  if(cliente){
    var parts=cliente.trim().toUpperCase().split(/\s+/);
    if(parts.length===1){cc=parts[0].slice(0,5)}
    else{var ap=parts[parts.length-1].slice(0,4);var ini=parts.slice(0,-1).map(function(p){return p[0]||''}).join('');cc=ini+ap}
  }
  return ct+'_'+cc+'_'+new Date().getFullYear();
}
function copyCod(txt){
  try{navigator.clipboard.writeText(txt)}catch(e){var t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)}
}

function cloudBadge(p){

  var cls=p.nubeServicio==='drive'?'cloud-a':p.nubeServicio==='dropbox'?'cloud-d':'cloud-n';
  return '<a href="'+p.nubeUrl+'" target="_blank" class="'+cls+'">'+lbl+'</a>';
}

  setTimeout(function(){
    if(filtro==='urgente'){

function buildCliPrev(cl){
  if(!cl)return'';
  var rl=cl.rolCliente==='propietario'?'Propietario':cl.rolCliente==='ambos'?'Cliente/Prop.':'Solo cliente';
  var rb=cl.rolCliente==='propietario'?'b-ejecucion':cl.rolCliente==='ambos'?'b-ejecutar':'b-posterior';
  return '<div class="card" style="margin-bottom:0">'+
    '<div style="display:flex;justify-content:space-between;margin-bottom:10px">'+
    '<div style="font-size:15px;font-weight:600">'+cl.nombre+'</div><span class="badge '+rb+'">'+rl+'</span></div>'+
    '<div class="g2" style="font-size:13px;gap:8px">'+
    '<div><span class="tx2">RUT:</span> '+(cl.rut||'—')+'</div>'+
    '<div><span class="tx2">Teléfono:</span> '+(cl.telefono||'—')+'</div>'+
    '<div><span class="tx2">Email:</span> '+(cl.email||'—')+'</div>'+
    '<div><span class="tx2">Dirección:</span> '+(cl.direccion||'—')+'</div>'+
    '</div>'+(cl.observaciones?'<div class="tsm tx2 mt2">'+cl.observaciones+'</div>':'')+
    '</div>';
}
function syncCli(cid){
  var clis=rdb('clientes',[]);
  var cl=clis.find(function(c){return c.id===cid});
  var pc=document.getElementById('PC');if(pc)pc.value=cid;
  var box=document.getElementById('CLIPREV');if(box)box.innerHTML=cl?buildCliPrev(cl):'';
}
function syncCli2(cid){
  var pc2=document.getElementById('PC2');if(pc2)pc2.value=cid;
  syncCli(cid);
}
function regenCod(){
  var clis=rdb('clientes',[]);
  var tram=(document.getElementById('PTT')||{}).value||'';
  var cid=(document.getElementById('PC')||{}).value||(document.getElementById('PC2')||{}).value||'';
  var cl=clis.find(function(c){return c.id===cid});
  var cod=genCod(tram,cl?cl.nombre:'');
  var inp=document.getElementById('PCOD');if(inp&&!inp.dataset.edited)inp.value=cod;
  else if(inp)inp.value=cod;
}
function loadChk(tramNom){
  var trams=rdb('tramites',defTrams());
  var t=trams.find(function(x){return x.nombre===tramNom});
  if(!t)return;
  var c=document.getElementById('CHKC');if(!c)return;
  c.innerHTML=t.chk.map(function(d,i){return '<div class="chk-row" id="CR'+i+'"><input type="checkbox" id="CK'+i+'" onchange="toggleCR('+i+')" style="width:16px;height:16px"><label for="CK'+i+'">'+d+'</label><button class="btn btn-sm btn-d" onclick="this.closest(\'.chk-row\').remove()">×</button></div>'}).join('');
  regenCod();
}
function toggleCR(i){var r=document.getElementById('CR'+i);if(r)r.classList.toggle('done',document.getElementById('CK'+i).checked)}
function addDoc(){var inp=document.getElementById('NDOC');if(!inp||!inp.value.trim())return;var c=document.getElementById('CHKC');var i=c.querySelectorAll('.chk-row').length;c.insertAdjacentHTML('beforeend','<div class="chk-row" id="CR'+i+'"><input type="checkbox" id="CK'+i+'" onchange="toggleCR('+i+')" style="width:16px;height:16px"><label for="CK'+i+'">'+inp.value.trim()+'</label><button class="btn btn-sm btn-d" onclick="this.closest(\'.chk-row\').remove()">×</button></div>');inp.value=''}

function addBit(){var inp=document.getElementById('BITIN');if(!inp||!inp.value.trim())return;var fecha=new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});var c=document.getElementById('BITL');var em=c.querySelector('.empty');if(em)em.remove();c.insertAdjacentHTML('beforeend','<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="badge b-posterior tsm">'+fecha+'</span><button class="btn btn-sm btn-d" onclick="this.closest(\'.card\').remove()">×</button></div><div style="font-size:13px">'+inp.value.trim()+'</div></div>');inp.value=''}

function saveProy(id,isNew){
  var ps=rdb('proyectos',[]);
  var clis=rdb('clientes',[]);
  var g=function(i){return(document.getElementById(i)||{}).value||''};
  var gc=function(i){return(document.getElementById(i)||{}).checked||false};
  var cid=g('PC')||g('PC2');
  var cl=clis.find(function(c){return c.id===cid});
  // checklist
  var chk=Array.from(document.querySelectorAll('#CHKC .chk-row')).map(function(row){return{texto:(row.querySelector('label')||{}).textContent||'',checked:(row.querySelector('input[type=checkbox]')||{}).checked||false}});
  // bitacora

// ── Honorarios calculator ──
function calcHon(){
  var fc=(document.getElementById('HFC')||{}).value||'total';
  var unit=parseFloat((document.getElementById('HUNIT')||{}).value||0);
  var cant=parseFloat((document.getElementById('HCANT')||{}).value||0);
  var lbl1=document.getElementById('HUNITLBL');
  var lbl2=document.getElementById('HCANTLBL');
  if(fc==='m2'){if(lbl1)lbl1.textContent='Valor por m² ($)';if(lbl2)lbl2.textContent='Superficie (m²)'}
  else if(fc==='lote'){if(lbl1)lbl1.textContent='Valor por lote ($)';if(lbl2)lbl2.textContent='Cantidad de lotes'}
  else{if(lbl1)lbl1.textContent='Valor unitario ($)';if(lbl2)lbl2.textContent='Cantidad'}
  if(unit>0&&cant>0&&fc!=='total'){
    var tot=unit*cant;
    var inp=document.getElementById('HTOT');if(inp)inp.value=tot;
    var info=document.getElementById('HCALCINFO');if(info)info.textContent='$'+Number(unit).toLocaleString('es-CL')+' × '+cant+' = $'+Number(tot).toLocaleString('es-CL');
    var show=document.getElementById('HTOTSHOW');if(show)show.textContent='$'+Number(tot).toLocaleString('es-CL');
  }
  calcSaldo();calcEspTot();
}
function calcSaldo(){
  var tot=parseFloat((document.getElementById('HTOT')||{}).value||0);
  var adl=parseFloat((document.getElementById('HADL')||{}).value||0);
  var sal=document.getElementById('HSAL');if(sal)sal.value=Math.max(0,tot-adl);
  var show=document.getElementById('HTOTSHOW');if(show)show.textContent='$'+Number(tot).toLocaleString('es-CL');
  calcEspTot();
}
function calcEspTot(){
  var tot=parseFloat((document.getElementById('HTOT')||{}).value||0);
  var ESPS_KEYS=[
    {k:'Ingeniería_estructural',hasQty:true},
    {k:'Proyecto_agua_potable',hasQty:false},
    {k:'Proyecto_alcantarillado',hasQty:false},
    {k:'Proyecto_eléctrico',hasQty:false},
    {k:'Proyecto_de_gas',hasQty:false},
    {k:'Topografía',hasQty:false},
    {k:'Fusión_de_predios',hasQty:true},
    {k:'Subdivisión_de_predios',hasQty:true},
  ];
  var espSum=0;
  ESPS_KEYS.forEach(function(ed){
    var cb=document.getElementById('ESP_'+ed.k);
    var vInp=document.getElementById('ESPV_'+ed.k);
    var cInp=document.getElementById('ESPC_'+ed.k);
    var rEl=document.getElementById('ESPR_'+ed.k);
    if(!cb||!vInp)return;
    var val=parseFloat(vInp.value||0);
    var qty=cInp?parseFloat(cInp.value||0):1;
    var subtotal=ed.hasQty?(val*qty):val;
    if(rEl)rEl.textContent='$'+Number(subtotal).toLocaleString('es-CL');
    if(cb.checked)espSum+=subtotal;
  });
  // also sum custom added specialidades
  document.querySelectorAll('#ESPEXT .row input[type=number]').forEach(function(inp){
    var cb=inp.parentElement.querySelector('input[type=checkbox]');
    if(cb&&cb.checked)espSum+=parseFloat(inp.value||0);
  });
  var all=document.getElementById('HTOTALL');
  if(all)all.textContent='$'+Number(tot+espSum).toLocaleString('es-CL');
}

function vHon(){

  var totP=ps.filter(function(p){return p.estadoPago==='pendiente'}).reduce(function(a,p){return a+parseFloat(p.saldo||p.totalHonorarios||0)},0);
  var totC=ps.filter(function(p){return p.estadoPago==='pagado'}).reduce(function(a,p){return a+parseFloat(p.totalHonorarios||0)},0);
  var totCu=ps.filter(function(p){return p.estadoPago==='cuotas'}).reduce(function(a,p){return a+parseFloat(p.totalHonorarios||0)},0);
  var byMonth={};
  conH.forEach(function(p){if(!p.fechaInicio)return;var d=new Date(p.fechaInicio);if(isNaN(d.getTime()))return;var k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');byMonth[k]=(byMonth[k]||0)+parseFloat(p.totalHonorarios||0)});
  var months=Object.keys(byMonth).sort().slice(-12);
  var maxVal=months.reduce(function(a,k){return Math.max(a,byMonth[k])},1);
  var bars=months.map(function(k){var v=byMonth[k];var pct=Math.round(v/maxVal*100);return'<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px"><div style="flex:1;display:flex;align-items:flex-end;width:100%;padding:0 2px"><div style="background:var(--txi);border-radius:3px 3px 0 0;width:100%;height:'+pct+'%;min-height:4px" title="'+k+': $'+Number(v).toLocaleString('es-CL')+'"></div></div><div class="tsm" style="font-size:9px;text-align:center;color:var(--tx3);margin-top:4px;white-space:nowrap">'+k.slice(5)+'</div></div>'}).join('');
  var rows=conH.length===0?'<tr><td colspan="7"><div class="empty">Sin honorarios</div></td></tr>':
    conH.map(function(p){return'<tr><td style="font-weight:600;cursor:pointer" onclick="editProy(\'+'+p.id+'+\')">'+(p.nombre||'—')+'</td><td>'+(p.cliente||'—')+'</td><td style="font-weight:600">$'+fmt(p.totalHonorarios)+'</td><td>$'+fmt(p.adelanto)+'</td><td>$'+fmt(p.saldo)+'</td><td>'+(p.formaCobro==='m2'?'Por m²':p.formaCobro==='lote'?'Por lote':p.formaCobro==='total'?'Total acordado':'Otro')+'</td><td><span class="badge b-'+(p.estadoPago||'pendiente')+'">'+stPago(p.estadoPago)+'</span></td></tr>'}).join('');
  document.getElementById('MAIN').innerHTML=
    '<div class="g4 mb2">'+
    '<div class="stat"><div class="stat-lbl">Total general</div><div class="stat-val">$'+fmt(totG)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">Pendiente</div><div class="stat-val" style="color:var(--txd)">$'+fmt(totP)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">En cuotas</div><div class="stat-val" style="color:var(--txw)">$'+fmt(totCu)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">Cobrado</div><div class="stat-val" style="color:var(--txs)">$'+fmt(totC)+'</div></div></div>'+
    (months.length>0?'<div class="card mb2"><div class="sec-ttl">Ingresos por mes</div><div style="display:flex;align-items:flex-end;gap:3px;height:100px;padding-bottom:28px">'+bars+'</div></div>':'')+
    '<div class="card"><div class="twrap"><table><thead><tr><th>Proyecto</th><th>Cliente</th><th>Total</th><th>Adelanto</th><th>Saldo</th><th>Forma cobro</th><th>Estado</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

  var bsel=document.getElementById('CBTN_SEL');
  var bnew=document.getElementById('CBTN_NEW');
  var bedit=document.getElementById('CBTN_EDIT');
  if(mode==='sel'){
    if(sel)sel.classList.remove('hidden');
    if(form)form.classList.add('hidden');
    if(bsel)bsel.classList.add('btn-p');if(bnew)bnew.classList.remove('btn-p');
  } else if(mode==='new'){
    if(sel)sel.classList.add('hidden');
    if(form)form.classList.remove('hidden');
    if(lbl){lbl.textContent='Completa los datos del nuevo cliente';lbl.style.background='var(--bgs)';lbl.style.color='var(--txs)'}
    if(bsel)bsel.classList.remove('btn-p');if(bnew)bnew.classList.add('btn-p');
    // clear form
    ['CLI_N','CLI_R','CLI_T','CLI_E','CLI_D','CLI_O'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=''});
    var idEl=document.getElementById('CLI_ID');if(idEl)idEl.value='';
    var rl=document.getElementById('CLI_RL');if(rl)rl.value='cliente';
  } else if(mode==='edit'){
    var cid=(document.getElementById('PC2')||{}).value||(document.getElementById('PC')||{}).value||'';
    if(!cid){alert('Selecciona un cliente primero');return}
    var clis=rdb('clientes',[]);
    var cl=clis.find(function(x){return x.id===cid});
    if(!cl)return;
    if(sel)sel.classList.add('hidden');
    if(form)form.classList.remove('hidden');
    if(lbl){lbl.textContent='Editando: '+cl.nombre;lbl.style.background='var(--bgw)';lbl.style.color='var(--txw)'}
    if(bsel)bsel.classList.remove('btn-p');if(bedit)bedit.classList.add('btn-p');
    var idEl=document.getElementById('CLI_ID');if(idEl)idEl.value=cl.id;
    var nEl=document.getElementById('CLI_N');if(nEl)nEl.value=cl.nombre||'';
    var rEl=document.getElementById('CLI_R');if(rEl)rEl.value=cl.rut||'';
    var tEl=document.getElementById('CLI_T');if(tEl)tEl.value=cl.telefono||'';
    var eEl=document.getElementById('CLI_E');if(eEl)eEl.value=cl.email||'';
    var dEl=document.getElementById('CLI_D');if(dEl)dEl.value=cl.direccion||'';
    var oEl=document.getElementById('CLI_O');if(oEl)oEl.value=cl.observaciones||'';
    var rlEl=document.getElementById('CLI_RL');if(rlEl)rlEl.value=cl.rolCliente||'cliente';
  }
}
function saveCliInline(){
  var g=function(id){return(document.getElementById(id)||{}).value||''};
  var nombre=g('CLI_N').trim();
  if(!nombre){alert('El nombre es obligatorio');return}
  var clis=rdb('clientes',[]);
  var existingId=g('CLI_ID');
  var isNew=!existingId;
  var newId=existingId||uid();
  var upd={id:newId,nombre:nombre,rut:g('CLI_R'),telefono:g('CLI_T'),email:g('CLI_E'),direccion:g('CLI_D'),rolCliente:g('CLI_RL')||'cliente',observaciones:g('CLI_O'),extraCampos:[]};
  if(isNew){clis.push(upd)}else{var idx=clis.findIndex(function(x){return x.id===newId});if(idx>=0)clis[idx]=upd}
  wdb('clientes',clis);
  // Update selects with new client
  var opt='<option value="'+newId+'" selected>'+nombre+(upd.rut?' · '+upd.rut:'')+'</option>';
  var pc2=document.getElementById('PC2');
  var pc=document.getElementById('PC');
  if(pc2){
    var existing=pc2.querySelector('option[value="'+newId+'"]');
    if(existing){existing.textContent=nombre+(upd.rut?' · '+upd.rut:'');pc2.value=newId}
    else{pc2.insertAdjacentHTML('beforeend','<option value="'+newId+'">'+nombre+(upd.rut?' · '+upd.rut:'')+'</option>');pc2.value=newId}
  }
  if(pc){
    var existing2=pc.querySelector('option[value="'+newId+'"]');
    if(existing2){existing2.textContent=nombre+(upd.rut?' · '+upd.rut:'');pc.value=newId}
    else{pc.insertAdjacentHTML('beforeend','<option value="'+newId+'">'+nombre+(upd.rut?' · '+upd.rut:'')+'</option>');pc.value=newId}
  }
  // Show preview
  var prev=document.getElementById('CLIPREV');if(prev)prev.innerHTML=buildCliPrev(upd);
  // Switch back to select mode
  cliMode('sel');
  // Add edit button if it didn't exist
  var bedit=document.getElementById('CBTN_EDIT');
  if(!bedit){
    var bnew=document.getElementById('CBTN_NEW');
    if(bnew)bnew.insertAdjacentHTML('afterend','<button id="CBTN_EDIT" class="btn btn-sm" onclick="cliMode(\'edit\')">✏️ Editar seleccionado</button>');
  }
  var lbl=document.getElementById('TC_FORMLBL');
  if(lbl)lbl.textContent='✓ Cliente '+(isNew?'creado':'actualizado')+' y vinculado correctamente';
}

// ── tab/modal helpers ──
function swTab(el,id){
  document.querySelectorAll('.tabs .tab').forEach(function(t){t.classList.remove('on')});el.classList.add('on');
  document.querySelectorAll('.modal [id^=T]').forEach(function(d){if(d.classList.contains('tab')||d.classList.contains('tabs'))return;d.classList.add('hidden')});
  var target=document.getElementById(id);if(target)target.classList.remove('hidden');
}
