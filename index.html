<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#fff;--bg2:#f5f5f0;--bg3:#eeecea;--bgi:#e6f1fb;--bgd:#fcebeb;--bgs:#eaf3de;--bgw:#faeeda;
--tx:#1a1a1a;--tx2:#5f5e5a;--tx3:#888780;--txi:#185fa5;--txd:#a32d2d;--txs:#3b6d11;--txw:#854f0b;
--bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--bd3:rgba(0,0,0,.32);
--bdi:#b5d4f4;--bdd:#f7c1c1;--bds:#c0dd97;--bdw:#fac775;
--r:8px;--R:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
@media(prefers-color-scheme:dark){:root{
--bg:#1e1e1c;--bg2:#2a2a27;--bg3:#242421;--bgi:#0c447c22;--bgd:#79202044;--bgs:#27500a33;--bgw:#63380644;
--tx:#e8e6df;--tx2:#b4b2a9;--tx3:#888780;--txi:#85b7eb;--txd:#f09595;--txs:#97c459;--txw:#ef9f27;
--bd:rgba(255,255,255,.10);--bd2:rgba(255,255,255,.18);--bd3:rgba(255,255,255,.28)}}
body{font-family:var(--font);background:var(--bg3);color:var(--tx);font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
/* sidebar */
.sb{width:220px;min-width:220px;background:var(--bg);border-right:.5px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;transition:transform .25s;z-index:200}
.sb-logo{padding:16px;border-bottom:.5px solid var(--bd)}
.sb-logoname{font-size:12px;color:var(--tx2);margin-top:4px}
.sb-logoph{font-size:17px;font-weight:600}
.sb-logoimg{width:100%;max-height:44px;object-fit:contain;display:none;margin-bottom:4px}
.sb-sec{padding:8px 0}
.sb-lbl{font-size:10px;font-weight:600;color:var(--tx3);padding:4px 16px;text-transform:uppercase;letter-spacing:.6px}
.sb-item{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--tx2);border-left:2px solid transparent;transition:all .15s}
.sb-item:hover{background:var(--bg2);color:var(--tx)}
.sb-item.active{color:var(--tx);background:var(--bg2);border-left-color:var(--tx)}
.sb-ico{font-size:14px;width:18px;text-align:center}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
.sb-overlay.on{display:block}
/* main */
.mn{flex:1;overflow:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--bg);border-bottom:.5px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar-ttl{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-act{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.hbtn{display:none;background:none;border:.5px solid var(--bd2);border-radius:var(--r);padding:6px 9px;cursor:pointer;color:var(--tx);font-size:18px;line-height:1}
.content{padding:16px;flex:1}
.sb-user{padding:12px 16px;margin-top:auto;border-top:.5px solid var(--bd)}
/* buttons */
.btn{border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);padding:6px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-family:var(--font)}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--tx);color:var(--bg);border-color:var(--tx)}.btn-p:hover{opacity:.85}
.btn-d{color:var(--txd);border-color:var(--bdd)}.btn-d:hover{background:var(--bgd)}
.btn-s{color:var(--txs);border-color:var(--bds)}.btn-s:hover{background:var(--bgs)}
.btn-sm{padding:4px 8px;font-size:12px}
/* layout */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--R);padding:16px;margin-bottom:12px}
.stat{background:var(--bg2);border-radius:var(--r);padding:14px}
.stat-lbl{font-size:12px;color:var(--tx2);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600}
.sec-ttl{font-size:13px;font-weight:600;margin-bottom:12px}
/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.b-urgente{background:var(--bgd);color:var(--txd)}.b-ejecutar{background:var(--bgw);color:var(--txw)}
.b-posterior{background:var(--bg2);color:var(--tx2)}.b-ejecucion{background:var(--bgi);color:var(--txi)}
.b-terminado{background:var(--bgs);color:var(--txs)}.b-porEjecutar{background:var(--bg2);color:var(--tx2)}
.b-pagado{background:var(--bgs);color:var(--txs)}.b-pendiente{background:var(--bgd);color:var(--txd)}
.b-cuotas{background:var(--bgw);color:var(--txw)}
/* fields */
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.fld input,.fld select,.fld textarea,.inp{width:100%;padding:7px 10px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:13px;font-family:var(--font)}
.fld input:focus,.fld select:focus,.fld textarea:focus,.inp:focus{outline:none;border-color:var(--bd3)}
.fld textarea{min-height:72px;resize:vertical}
/* table */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-weight:600;font-size:11px;color:var(--tx2);text-align:left;padding:8px 10px;border-bottom:.5px solid var(--bd);text-transform:uppercase;letter-spacing:.3px}
td{padding:9px 10px;border-bottom:.5px solid var(--bd);color:var(--tx)}
tr:hover td{background:var(--bg2)}
tr.urg td:first-child{border-left:3px solid var(--txd)}
tr.eje td:first-child{border-left:3px solid var(--txw)}
tr.pos td:first-child{border-left:3px solid var(--bd)}
/* modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:1000;overflow-y:auto}
.modal{background:var(--bg);border-radius:var(--R);border:.5px solid var(--bd);width:100%;max-width:700px;padding:24px;margin:auto}
.mhdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:.5px solid var(--bd)}
.mttl{font-size:16px;font-weight:600}
.xbtn{background:none;border:none;cursor:pointer;color:var(--tx2);font-size:24px;padding:0 4px;line-height:1}
/* tabs */
.tabs{display:flex;gap:4px;padding-bottom:14px;border-bottom:.5px solid var(--bd);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;color:var(--tx2);border:.5px solid transparent;transition:all .15s}
.tab:hover{background:var(--bg2)}
.tab.on{background:var(--bg2);color:var(--tx);border-color:var(--bd)}
/* misc */
.chk-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--bd)}
.chk-row label{flex:1;font-size:13px;cursor:pointer}
.chk-row.done label{text-decoration:line-through;color:var(--tx3)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-sumaugencia{background:#c0000a}.dot-urgente{background:#e24b4a}.dot-ejecutar{background:#ef9f27}.dot-paralizado{background:#888}.dot-posterior{background:var(--bd2)}
.b-paralizado{background:#e8e8e8;color:#555}.b-sumaugencia{background:#fcebeb;color:#a32d2d;border:1px solid #f7c1c1}
.empty{text-align:center;padding:40px;color:var(--tx3);font-size:13px}
.hr{border:none;border-top:.5px solid var(--bd);margin:16px 0}
.row{display:flex;gap:8px;align-items:center}
.f1{flex:1}
.tx2{color:var(--tx2)}.tsm{font-size:12px}.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:16px}.mb2{margin-bottom:8px}.mb3{margin-bottom:16px}
.hidden{display:none!important}
.cloud-a,.cloud-d,.cloud-n{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--r);font-size:11px;font-weight:600;text-decoration:none;cursor:pointer}
.cloud-a{background:#e8f4fd;color:#1a73e8;border:.5px solid #b8d4f8}
.cloud-d{background:#e8f0fb;color:#0061ff;border:.5px solid #aac4f8}
.cloud-n{background:var(--bg2);color:var(--tx3);border:.5px solid var(--bd)}
.cod{font-family:monospace;font-size:11px;background:var(--bg2);padding:2px 6px;border-radius:4px;cursor:pointer}
/* mobile */
@media(max-width:768px){
.sb{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.15)}
.sb.open{transform:translateX(0)}
.hbtn{display:flex;align-items:center;justify-content:center}
.content{padding:12px}
.g2,.g3,.g4{grid-template-columns:1fr}
.g4{grid-template-columns:1fr 1fr}
.mov{padding:0;align-items:flex-end}
.modal{border-radius:var(--R) var(--R) 0 0;max-height:92vh;overflow-y:auto;max-width:100%}
th,td{padding:7px 8px;font-size:12px}}
</style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDlGzpRzA4ze5TSMyGwTxREs1sPPZR6DZg",
  authDomain: "mi-planer-8801c.firebaseapp.com",
  projectId: "mi-planer-8801c",
  storageBucket: "mi-planer-8801c.firebasestorage.app",
  messagingSenderId: "243910049708",
  appId: "1:243910049708:web:a73b9bad428d2171e08409"
};
firebase.initializeApp(firebaseConfig);
const _db = firebase.firestore();
const _ARQ_DOC = _db.collection("arqgestion").doc("estudio_modulo_sur");

window._arqSave = function(data) {
  return _ARQ_DOC.set({ payload: JSON.stringify(data) }).catch(function(e){
    console.error("Error guardando ARQ:", e);
  });
};
window._arqLoad = function() {
  return _ARQ_DOC.get().then(function(snap) {
    if (snap.exists) return JSON.parse(snap.data().payload);
    return null;
  }).catch(function(e){ return null; });
};
window._arqListen = function(callback) {
  return _ARQ_DOC.onSnapshot(function(snap) {
    if (snap.exists) {
      try { callback(JSON.parse(snap.data().payload)); } catch(e) {}
    }
  });
};
window._arqFirebaseReady = true;
window.dispatchEvent(new Event("arq-firebase-ready"));
</script>
</head>
<body>
<div class="app">
  <div class="sb" id="SB">
    <div class="sb-logo">
      <img class="sb-logoimg" id="LOGO" src="" alt="">
      <div class="sb-logoph" id="LOGOPH">ARQ<span style="font-weight:300;color:var(--tx2)">gestión</span></div>
      <div class="sb-logoname" id="EMPNM">Mi Estudio de Arquitectura</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Principal</div>
      <div class="sb-item" data-v="dashboard" onclick="go('dashboard')"><span class="sb-ico">◈</span>Dashboard</div>
      <div class="sb-item" data-v="planificacion" onclick="go('planificacion')"><span class="sb-ico">📋</span>Planificación</div>
      <div class="sb-item" data-v="proyectos" onclick="go('proyectos')"><span class="sb-ico">⊟</span>Base de datos</div>

      <div class="sb-lbl">Datos</div>
      <div class="sb-item" data-v="clientes" onclick="go('clientes')"><span class="sb-ico">⊡</span>Clientes</div>
      <div class="sb-item" data-v="tramites" onclick="go('tramites')"><span class="sb-ico">⊞</span>Trámites</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Informes</div>
      <div class="sb-item" data-v="informes" onclick="go('informes')"><span class="sb-ico">⊘</span>Informes / PDF</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Finanzas</div>
      <div class="sb-item" data-v="presupuestos" onclick="go('presupuestos')"><span class="sb-ico">⊛</span>Presupuestos</div>
      <div class="sb-item" data-v="honorarios" onclick="go('honorarios')"><span class="sb-ico">⊜</span>Honorarios</div>

    <div id="arq-sync" style="font-size:10px;color:#3b6d11;padding:4px 16px;text-align:center;border-bottom:.5px solid var(--bd)">✓ Sincronizado</div>
<div class="sb-user">
      <div class="tsm tx2 mb2">Usuario activo:</div>
      <select id="USEL" onchange="setUser(this.value)" class="inp" style="width:100%">
        <option value="u1">Usuario 1</option>
        <option value="u2">Usuario 2</option>

  </div>
  <div class="sb-overlay" id="OV" onclick="closeSB()"></div>
  <div class="mn">
    <div class="topbar">
      <button class="hbtn" onclick="toggleSB()">&#9776;</button>
      <div class="topbar-ttl" id="PTTL">Dashboard</div>
      <div class="topbar-act" id="PACT"></div>
    </div>
    <div class="content" id="MAIN"></div>
  </div>
  <div id="MOD"></div>
</div>
<script>
// ── Storage ──
var CU='u1';
function rdb(k,d){try{var v=localStorage.getItem('arq_'+CU+'_'+k);return v?JSON.parse(v):d}catch(e){return d}}
function wdb(k,v){
  localStorage.setItem('arq_'+CU+'_'+k,JSON.stringify(v));
  // Sync a Firebase con debounce
  clearTimeout(window._arqSaveTimer);
  window._arqSaveTimer=setTimeout(function(){_arqPushToFirebase();},800);
}
function _arqGetAllData(){
  var keys=['proyectos','clientes','tramites','presupuestos','config',
            'profNombre','profProfesion','profTelefono','profEmail'];
  var data={logo:localStorage.getItem('arq_logo')||''};
  // plan subtareas data (shared, not per-user)
  var planV=localStorage.getItem('arq_plan_st');if(planV)data.plan_st=planV;
  var planOwn=localStorage.getItem('arq_plan_own');if(planOwn)data.plan_own=planOwn;
  var bancosV=localStorage.getItem('arq_bancos');if(bancosV)data.bancos=bancosV;
  var notasV=localStorage.getItem('arq_notas_pred');if(notasV)data.notas_pred=notasV;
  var profsV=localStorage.getItem('arq_profesionales');if(profsV)data.profesionales=profsV;
  ['u1','u2'].forEach(function(u){
    keys.forEach(function(k){
      var v=localStorage.getItem('arq_'+u+'_'+k);
      if(v)data[u+'_'+k]=v;
    });
    var un=localStorage.getItem('arq_'+u+'_UN');
    if(un)data[u+'_UN']=un;
  });
  return data;
}
function _arqApplyData(data){
  if(!data)return;
  var keys=['proyectos','clientes','tramites','presupuestos','config',
            'profNombre','profProfesion','profTelefono','profEmail'];
  if(data.plan_st)localStorage.setItem('arq_plan_st',data.plan_st);
  if(data.plan_own)localStorage.setItem('arq_plan_own',data.plan_own);
  if(data.bancos)localStorage.setItem('arq_bancos',data.bancos);
  if(data.notas_pred)localStorage.setItem('arq_notas_pred',data.notas_pred);
  if(data.profesionales)localStorage.setItem('arq_profesionales',data.profesionales);
  ['u1','u2'].forEach(function(u){
    keys.forEach(function(k){
      if(data[u+'_'+k]!==undefined)localStorage.setItem('arq_'+u+'_'+k,data[u+'_'+k]);
    });
    if(data[u+'_UN'])localStorage.setItem('arq_'+u+'_UN',data[u+'_UN']);
  });
  if(data.logo){localStorage.setItem('arq_logo',data.logo);loadLogo();}
}
var _arqSkipNext=false;
function _arqPushToFirebase(){
  if(!window._arqSave)return;
  _arqSkipNext=true;
  window._arqSave(_arqGetAllData()).then(function(){
    showSyncARQ('saved');
    setTimeout(function(){_arqSkipNext=false;},8000);
  }).catch(function(){showSyncARQ('offline');_arqSkipNext=false;});
  showSyncARQ('saving');
}
function showSyncARQ(st){
  var el=document.getElementById('arq-sync');
  if(!el)return;
  if(st==='saving'){el.textContent='☁ Guardando…';el.style.color='#f0a500';}
  else if(st==='saved'){el.textContent='✓ Sincronizado';el.style.color='#3b6d11';}
  else if(st==='offline'){el.textContent='⚠ Sin conexión';el.style.color='#a32d2d';}
}
function _arqInitFirebase(){
  if(!window._arqLoad)return;
  showSyncARQ('saving');
  window._arqLoad().then(function(data){
    if(data){_arqApplyData(data);}
    showSyncARQ('saved');
    // Escuchar cambios en tiempo real
    window._arqListen(function(data){
      if(_arqSkipNext){return;}
      var openModal=document.querySelector('.modal.active,.modal[style*="flex"]');
      if(openModal){return;}
      _arqApplyData(data);
      go(CV);
      showSyncARQ('saved');
    });
  }).catch(function(){showSyncARQ('offline');});
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fmt(n){return Number(n||0).toLocaleString('es-CL')}
function stEst(e){return{ejecucion:'En ejecución',terminado:'Terminado',porEjecutar:'Por ejecutar'}[e]||'Por ejecutar'}
function stPago(e){return{pagado:'Pagado',pendiente:'Pendiente',cuotas:'En cuotas'}[e]||'Pendiente'}
function stUrg(e){return{sumaugencia:'Suma urgencia',urgente:'Urgente',ejecutar:'Por ejecutar',paralizado:'Paralizado',posterior:'Posterior'}[e]||'Posterior'}

function setUser(u){CU=u;go(CV);}
// Iniciar Firebase sync al cargar
(function(){
  function startARQ(){
    // Cargar desde localStorage primero (inmediato)
    go(CV);
    // Luego sincronizar con Firebase
    if(window._arqFirebaseReady){_arqInitFirebase();}
    else{window.addEventListener('arq-firebase-ready',_arqInitFirebase,{once:true});}
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',startARQ);
  } else {
    startARQ();
  }
})();

// ── Sidebar mobile ──
function toggleSB(){
  var sb=document.getElementById('SB'),ov=document.getElementById('OV');
  if(sb.classList.contains('open')){closeSB()}else{sb.classList.add('open');ov.classList.add('on')}
}
function closeSB(){
  document.getElementById('SB').classList.remove('open');
  document.getElementById('OV').classList.remove('on');
}

// ── Navigation ──
var CV='dashboard';
var TITLES={dashboard:'Dashboard',planificacion:'Planificación de Proyectos',proyectos:'Base de datos de Proyectos',buscador:'Buscador / Base de datos',clientes:'Clientes',tramites:'Tipos de Trámites',informes:'Informes / PDF',presupuestos:'Presupuestos',honorarios:'Honorarios',config:'Configuración'};
function go(v){
  if(window.innerWidth<=768)closeSB();
  CV=v;
  document.querySelectorAll('.sb-item').forEach(function(n){n.classList.remove('active')});
  var el=document.querySelector('.sb-item[data-v="'+v+'"]');
  if(el)el.classList.add('active');
  document.getElementById('PTTL').textContent=TITLES[v]||v;

// ── Code generation ──
function genCod(tramite,cliente){
  var tmap={'Permiso de edificación':'PEON','Ampliación':'AMP','Ampliación obra menor':'AMPOM','Regularización Ley 20898 hasta 90':'REG90','Regularización Ley 20898 hasta 140':'REG140','Regularización obra menor antes':'REG59','Regularización de microempresas':'REGME','Obra menor':'OM','Fusión':'FUS','Subdivisión':'SUB'};
  var ct='PROY';
  for(var k in tmap){if(tramite&&tramite.indexOf(k)>=0){ct=tmap[k];break}}
  if(ct==='PROY'&&tramite){ct=tramite.split(' ').map(function(w){return w[0]||''}).join('').toUpperCase().slice(0,6)}
  var cc='CLI';
  if(cliente){
    var parts=cliente.trim().toUpperCase().split(/\s+/);
    if(parts.length===1){cc=parts[0].slice(0,5)}
    else{var ap=parts[parts.length-1].slice(0,4);var ini=parts.slice(0,-1).map(function(p){return p[0]||''}).join('');cc=ini+ap}
  }
  return ct+'_'+cc+'_'+new Date().getFullYear();
}
function copyCod(txt){
  try{navigator.clipboard.writeText(txt)}catch(e){var t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)}
}

}

  var bdActivos=rdb('proyectos',[]).filter(function(p){return p.estado==='ejecucion'||p.estado==='porEjecutar'||!p.estado}).map(function(p){return Object.assign({},p,{_origen:'bd'})});
  var bdTerm=rdb('proyectos',[]).filter(function(p){return p.estado==='terminado'}).map(function(p){return Object.assign({},p,{_origen:'bd'})});
  var own=getPlanOwn().map(function(p){return Object.assign({},p,{_origen:'own'})});
  return {activos:bdActivos.concat(own.filter(function(p){return p.estado!=='completado'})),completados:bdTerm.concat(own.filter(function(p){return p.estado==='completado'}))};
}

function planSyncCliEdit(val){if(!val)return;var parts=val.split('|');var inp=document.getElementById('PLE_CLINOM');if(inp)inp.value=parts[1]||''}
function planGuardarEdit(id,origen){
  var g=function(i){return(document.getElementById(i)||{}).value||''};
  var desc=planGetEditorVal('PLE_DESC');
  var nuevoEst=g('PLE_EST');
  var stData=getPlanST(id);stData.desc=desc;
  if(nuevoEst==='completado'&&!stData.fechaCompletado)stData.fechaCompletado=Date.now();
  if(nuevoEst!=='completado')stData.fechaCompletado=null;
  savePlanST(id,stData);
  if(origen==='own'){
    var arr=getPlanOwn();var idx=arr.findIndex(function(x){return x.id===id});
    if(idx>=0){
      var cliSel=g('PLE_CLISEL');
      arr[idx].nombre=g('PLE_NOM')||arr[idx].nombre;
      arr[idx].clienteId=cliSel?cliSel.split('|')[0]:'';
      arr[idx].cliente=(document.getElementById('PLE_CLINOM')||{}).value||arr[idx].cliente;
      arr[idx].tipoTramite=g('PLE_TRAM');arr[idx].urgencia=g('PLE_URG')||arr[idx].urgencia;
      arr[idx].estado=nuevoEst||arr[idx].estado;arr[idx].fechaInicio=g('PLE_FECHA')||arr[idx].fechaInicio;
      savePlanOwn(arr);
    }
  } else {
    if(nuevoEst==='completado'){var ps=rdb('proyectos',[]);var idx=ps.findIndex(function(x){return x.id===id});if(idx>=0){ps[idx].estado='terminado';wdb('proyectos',ps);}}
  }
  closeMod();vPlan();
}

}

function planGuardarST(id,idx){
  var txt=(document.getElementById('ST_TXT')||{}).value||'';if(!txt.trim())return alert('Escribe la descripcion');

  var fechaRaw=(document.getElementById('ST_FECHA')||{}).value||'';
  var desc=planGetEditorVal('ST_DESC');
  var stData=getPlanST(id);if(!stData.subtareas)stData.subtareas=[];
  var fechaFmt=fechaRaw?new Date(fechaRaw+'T12:00:00').toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
  if(idx===null)stData.subtareas.push({texto:txt.trim(),prioridad:prior,fecha:fechaFmt,fechaRaw:fechaRaw,desc:desc,done:false});
  else{var old=stData.subtareas[idx];stData.subtareas[idx]=Object.assign({},old,{texto:txt.trim(),prioridad:prior,fecha:fechaFmt,fechaRaw:fechaRaw,desc:desc});}

}

function vDash(){
  var ps=rdb('proyectos',[]);
  document.getElementById('PACT').innerHTML='<button class="btn btn-p btn-sm" onclick="newProy()">+ Nuevo proyecto</button>';

  // ── Proyectos stats ──
  var totProy=ps.length;
  var sumUrg=ps.filter(function(p){return p.urgencia==='sumaugencia'}).length;
  var urg=ps.filter(function(p){return p.urgencia==='urgente'||p.urgencia==='sumaugencia'}).length;
  var eje=ps.filter(function(p){return p.estado==='ejecucion'}).length;
  var paraliz=ps.filter(function(p){return p.urgencia==='paralizado'}).length;

  // ── Financiero ──
  var totHon=ps.reduce(function(a,p){return a+parseFloat(p.totalHonorarios||0)},0);
  var totAdl=ps.reduce(function(a,p){return a+parseFloat(p.adelanto||0)},0);
  var totSaldo=ps.reduce(function(a,p){return a+parseFloat(p.saldo||0)},0);
  var cobrado=ps.filter(function(p){return p.estadoPago==='pagado'}).reduce(function(a,p){return a+parseFloat(p.totalHonorarios||0)},0);
  var enCuotas=ps.filter(function(p){return p.estadoPago==='cuotas'}).reduce(function(a,p){return a+parseFloat(p.totalHonorarios||0)},0);
  var pendiente=ps.filter(function(p){return p.estadoPago==='pendiente'}).reduce(function(a,p){return a+parseFloat(p.saldo||p.totalHonorarios||0)},0);
  var pctCobrado=totHon>0?Math.round(cobrado/totHon*100):0;
  var pctPendiente=totHon>0?Math.round(pendiente/totHon*100):0;

  // ── Proyectos por prioridad ──
  var sorted=[].concat(ps).sort(function(a,b){return ({sumaugencia:0,urgente:1,ejecutar:2,paralizado:3,posterior:4}[a.urgencia]||4)-({sumaugencia:0,urgente:1,ejecutar:2,paralizado:3,posterior:4}[b.urgencia]||4)});
  var rows=sorted.length===0?'<div class="empty">Sin proyectos.<br>Crea el primero con el botón arriba.</div>':
    sorted.slice(0,8).map(function(p){
      return '<div onclick="editProy(\''+p.id+'\')" style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:.5px solid var(--bd);cursor:pointer">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
        '<span class="dot dot-'+(p.urgencia==='sumaugencia'?'urgente':p.urgencia||'posterior')+'"></span>'+
        '<div><div style="font-size:13px;font-weight:600">'+(p.nombre||'Sin nombre')+'</div>'+
        '<div class="tsm tx2">'+(p.tipoTramite||'—')+' · '+(p.cliente||'—')+'</div></div></div>'+
        '<div style="display:flex;align-items:center;gap:6px">'+
        '<span class="badge b-'+(p.urgencia==='sumaugencia'?'urgente':p.urgencia||'posterior')+'">'+stUrg(p.urgencia)+'</span>'+
        '<span class="badge b-'+(p.estado||'porEjecutar')+'">'+stEst(p.estado)+'</span></div></div>';
    }).join('');

  // ── Pagos pendientes detalle ──
  var pendRows=ps.filter(function(p){return p.estadoPago!=='pagado'&&p.totalHonorarios}).map(function(p){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--bd);cursor:pointer" onclick="editProy(\''+p.id+'\')">'+
      '<div><div style="font-size:13px;font-weight:500">'+(p.nombre||'—')+'</div>'+
      '<div class="tsm tx2">'+(p.cliente||'—')+'</div></div>'+
      '<div style="text-align:right">'+
      '<div style="font-size:13px;font-weight:600;color:var(--txd)">$'+fmt(p.saldo||p.totalHonorarios)+'</div>'+
      '<span class="badge b-'+(p.estadoPago||'pendiente')+'">'+stPago(p.estadoPago)+'</span></div></div>';
  }).join('')||'<div class="empty" style="padding:20px">Sin deudas pendientes ✓</div>';

  // ── Progress bar helper ──
  function bar(pct,color){return '<div style="background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;margin-top:6px"><div style="background:'+color+';height:100%;width:'+pct+'%;border-radius:4px;transition:width .4s"></div></div>';}

  document.getElementById('MAIN').innerHTML=
    // ── Fila 1: stats de proyectos ──
    '<div class="g4 mb2">'+
    '<div class="stat" style="cursor:pointer" onclick="go(\'proyectos\')"><div class="stat-lbl">📁 Total proyectos</div><div class="stat-val">'+totProy+'</div><div class="tsm tx2 mt1">'+eje+' en ejecución</div></div>'+
    '<div class="stat" style="cursor:pointer;border:.5px solid var(--bdd)" onclick="go(\'proyectos\')"><div class="stat-lbl" style="color:var(--txd)">⚡ Urgentes</div><div class="stat-val" style="color:var(--txd)">'+urg+'</div><div class="tsm tx2 mt1">'+(sumUrg?sumUrg+' suma urgencia':paraliz+' paralizado'+(paraliz!==1?'s':''))+'</div></div>'+
    '<div class="stat" style="border:.5px solid var(--bds)"><div class="stat-lbl" style="color:var(--txs)">✓ Cobrado</div><div class="stat-val" style="color:var(--txs)">$'+fmt(cobrado)+'</div><div class="tsm tx2 mt1">'+pctCobrado+'% del total</div>'+bar(pctCobrado,'var(--txs)')+'</div>'+
    '<div class="stat" style="border:.5px solid var(--bdw)"><div class="stat-lbl" style="color:var(--txw)">⏳ Por cobrar</div><div class="stat-val" style="color:var(--txw)">$'+fmt(pendiente+enCuotas)+'</div><div class="tsm tx2 mt1">'+pctPendiente+'% del total</div>'+bar(pctPendiente,'var(--txw)')+'</div>'+
    '</div>'+
    // ── Fila 2: financiero resumen ──
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px">'+
    '<div class="stat"><div class="stat-lbl">💰 Total honorarios</div><div style="font-size:20px;font-weight:700">$'+fmt(totHon)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">📥 Adelantos recibidos</div><div style="font-size:20px;font-weight:700;color:var(--txs)">$'+fmt(totAdl)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">🔄 En cuotas</div><div style="font-size:20px;font-weight:700;color:var(--txw)">$'+fmt(enCuotas)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">🔴 Saldo pendiente</div><div style="font-size:20px;font-weight:700;color:var(--txd)">$'+fmt(totSaldo)+'</div></div>'+
    '</div>'+
    // ── Fila 3: barra global cobrado/pendiente ──
    '<div class="card mb2" style="padding:14px 16px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<span style="font-size:12px;font-weight:600">Avance financiero global</span>'+
    '<span class="tsm tx2">$'+fmt(cobrado)+' cobrado de $'+fmt(totHon)+'</span></div>'+
    '<div style="background:var(--bg3);border-radius:6px;height:14px;overflow:hidden">'+
    '<div style="background:var(--txs);height:100%;width:'+pctCobrado+'%;border-radius:6px;transition:width .5s;position:relative">'+
    (pctCobrado>8?'<span style="position:absolute;right:8px;top:0;line-height:14px;font-size:10px;font-weight:700;color:#fff">'+pctCobrado+'%</span>':'')+
    '</div></div>'+
    '<div style="display:flex;gap:16px;margin-top:8px;font-size:11px">'+
    '<span style="color:var(--txs)">■ Cobrado '+pctCobrado+'%</span>'+
    '<span style="color:var(--txw)">■ En cuotas '+(totHon>0?Math.round(enCuotas/totHon*100):0)+'%</span>'+
    '<span style="color:var(--txd)">■ Pendiente '+pctPendiente+'%</span>'+
    '</div></div>'+
    // ── Fila 4: proyectos + pagos pendientes ──
    '<div class="g2">'+
    '<div class="card"><div class="sec-ttl">Proyectos por prioridad</div>'+rows+'</div>'+

    '</div>';
}

  setTimeout(function(){
    if(filtro==='urgente'){
      var fu=document.getElementById('FU');if(fu){fu.value='urgente';renderTabla()}
    } else if(filtro==='ejecucion'){
      var fe=document.getElementById('FE');if(fe){fe.value='ejecucion';renderTabla()}
    } else if(filtro==='pendiente'){
      // Go to buscador with pago filter
      go('buscador');
      setTimeout(function(){var sp=document.getElementById('SP');if(sp){sp.value='pendiente';doSearch()}},50);
    }
  },50);
}

    '<tbody>'+rows+'</tbody></table></div>';

}
function _closeEstMenus(){
  document.querySelectorAll('[id^=ESTM_]').forEach(function(m){m.style.display='none'});
}
function toggleEstMenu(id,e){
  e.stopPropagation();
  // Close all others first
  document.querySelectorAll('[id^=ESTM_]').forEach(function(m){if(m.id!=='ESTM_'+id)m.style.display='none'});
  var m=document.getElementById('ESTM_'+id);
  if(!m)return;
  var isOpen=m.style.display!=='none';
  m.style.display=isOpen?'none':'block';
  if(!isOpen){
    // Close on next outside click
    setTimeout(function(){document.addEventListener('click',_closeEstMenus,{once:true})},0);
  }
}
function cambiarEstado(id,nuevoEstado){
  var ps=rdb('proyectos',[]);
  var idx=ps.findIndex(function(x){return x.id===id});
  if(idx<0)return;
  var estadoAnterior=ps[idx].estado;
  ps[idx].estado=nuevoEstado;
  wdb('proyectos',ps);
  // Si cambió a terminado, mostrar notificación y ofrecer ir al historial
  if(nuevoEstado==='terminado'&&estadoAnterior!=='terminado'){
    renderTabla();
    // Pequeño toast
    var toast=document.createElement('div');
    toast.innerHTML='✅ <strong>'+(ps[idx].nombre||'Proyecto')+'</strong> marcado como Terminado. <span style="color:var(--txi);cursor:pointer;text-decoration:underline" onclick="go(\'historial\')">Ver en Historial</span>';
    toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg);border:.5px solid var(--bds);border-radius:var(--R);padding:12px 20px;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;font-size:13px;color:var(--txs);white-space:nowrap';
    document.body.appendChild(toast);
    setTimeout(function(){if(toast.parentNode)toast.parentNode.removeChild(toast)},5000);
  } else {
    renderTabla();
  }
}
function delProy(id){
  if(!confirm('¿Eliminar este proyecto?'))return;
  var ps=rdb('proyectos',[]).filter(function(p){return p.id!==id});
  wdb('proyectos',ps);renderTabla();
}

  // especialidades
  var ESPS_SAVE=['Ingeniería estructural','Proyecto agua potable','Proyecto alcantarillado','Proyecto eléctrico','Proyecto de gas','Topografía','Fusión de predios','Subdivisión de predios'];
  var espArr=ESPS_SAVE.map(function(e){var k=e.replace(/[\s]/g,'_');return{nombre:e,activo:gc('ESP_'+k),valor:g('ESPV_'+k),cantidad:g('ESPC_'+k)}});
  document.querySelectorAll('#ESPEXT .row').forEach(function(row){var lbl=(row.querySelector('label')||{}).textContent||'';var k=lbl.replace(/[\s]/g,'_');espArr.push({nombre:lbl,activo:gc('ESP_'+k),valor:g('ESPV_'+k),cantidad:''});});
  var ctec=Array.from(document.querySelectorAll('#CTEC .ctec-row')).map(function(row){return{label:(row.querySelector('.ctec-lbl')||{}).textContent||'',valor:(row.querySelector('input')||{}).value||''}});
  var upd={id:id,nombre:g('PN'),clienteId:cid,cliente:cl?cl.nombre:'',tipoTramite:g('PTT'),urgencia:g('PU')||'posterior',estado:g('PE')||'porEjecutar',proceso:g('PPR')||'diseño',rol:g('PROL'),fechaInicio:g('PDATE'),observaciones:g('POBS'),codigo:g('PCOD'),nubeServicio:g('PNSV'),nubeUrl:g('PNURL'),descripcionAcuerdo:g('HDESC'),formaCobro:g('HFC'),totalHonorarios:parseFloat(g('HTOT')||0),valorUnitario:parseFloat(g('HUNIT')||0),cantidadHon:parseFloat(g('HCANT')||0),adelanto:parseFloat(g('HADL')||0),saldo:parseFloat(g('HSAL')||0),estadoPago:g('HEP')||'pendiente',direccionProp:g('PDIR'),rolProp:g('PROLP'),fojas:g('PFJ'),numEscritura:g('PNE'),anioEscritura:g('PAE'),supPredio:g('PSUP'),dNorte:g('PDN'),dSur:g('PDS'),dEste:g('PDE'),dOeste:g('PDO'),utmNorte:g('PUTN'),utmEste:g('PUTE'),descPredio:g('PDESP'),descProyecto:g('CDESC'),m2:g('CM2'),materialidad:g('CMAT'),referencias:g('CREF'),checklist:chk,bitacora:bit,programa:prog,extraCampos:ext,especialidades:espArr,ctec:ctec};
  if(isNew)ps.push(upd);else{var idx=ps.findIndex(function(x){return x.id===id});if(idx>=0)ps[idx]=upd;else ps.push(upd)}
  wdb('proyectos',ps);closeMod();go('proyectos');
}

function doSearch(){
  var ps=rdb('proyectos',[]);var clis=rdb('clientes',[]);
  var sn=(document.getElementById('SN')||{}).value||'';sn=sn.toLowerCase();
  var sc=(document.getElementById('SC')||{}).value||'';sc=sc.toLowerCase();
  var scl=(document.getElementById('SCL')||{}).value||'';scl=scl.toLowerCase();
  var st=(document.getElementById('ST')||{}).value||'';
  var se=(document.getElementById('SE')||{}).value||'';
  var sp=(document.getElementById('SP')||{}).value||'';
  var su=(document.getElementById('SU')||{}).value||'';
  var res=ps.filter(function(p){
    var cl=clis.find(function(c){return c.id===p.clienteId})||{};
    var clstr=((cl.nombre||p.cliente||'')+' '+(cl.rut||'')).toLowerCase();
    return(!sn||( p.nombre||'').toLowerCase().indexOf(sn)>=0)&&
      (!sc||(p.codigo||'').toLowerCase().indexOf(sc)>=0)&&
      (!scl||clstr.indexOf(scl)>=0)&&
      (!st||p.tipoTramite===st)&&
      (!se||p.estado===se)&&
      (!sp||p.estadoPago===sp)&&(!su||p.urgencia===su);
  });
  var rows=res.length===0?'<div class="empty">Sin resultados</div>':
    '<div class="tsm tx2 mb2">'+res.length+' resultado'+(res.length!==1?'s':'')+' encontrado'+(res.length!==1?'s':'')+'</div>'+
    '<div class="twrap"><table><thead><tr><th>Código</th><th>Proyecto</th><th>Cliente</th><th>Trámite</th><th>Prioridad</th><th>Estado</th><th>Pago</th><th>Honorarios</th><th>Carpeta</th><th></th></tr></thead><tbody>'+
    res.map(function(p){return'<tr><td class="cod">'+(p.codigo||'—')+'</td><td style="font-weight:600">'+(p.nombre||'—')+'</td><td>'+(p.cliente||'—')+'</td><td>'+(p.tipoTramite||'—')+'</td><td><span class="badge b-'+(p.urgencia||'posterior')+'">'+stUrg(p.urgencia)+'</span></td><td><span class="badge b-'+(p.estado||'porEjecutar')+'">'+stEst(p.estado)+'</span></td><td><span class="badge b-'+(p.estadoPago||'pendiente')+'">'+stPago(p.estadoPago)+'</span></td><td>$'+fmt(p.totalHonorarios)+'</td><td>'+cloudBadge(p)+'</td><td><button class="btn btn-sm" onclick="editProy(\''+p.id+'\')">Ver</button></td></tr>'}).join('')+
    '</tbody></table></div>';
  document.getElementById('SRES').innerHTML=rows;
}

// ── Honorarios calculator ──
function calcHon(){
  var fc=(document.getElementById('HFC')||{}).value||'total';
  var unit=parseFloat((document.getElementById('HUNIT')||{}).value||0);
  var cant=parseFloat((document.getElementById('HCANT')||{}).value||0);
  var lbl1=document.getElementById('HUNITLBL');
  var lbl2=document.getElementById('HCANTLBL');
  if(fc==='m2'){if(lbl1)lbl1.textContent='Valor por m² ($)';if(lbl2)lbl2.textContent='Superficie (m²)'}
  else if(fc==='lote'){if(lbl1)lbl1.textContent='Valor por lote ($)';if(lbl2)lbl2.textContent='Cantidad de lotes'}
  else{if(lbl1)lbl1.textContent='Valor unitario ($)';if(lbl2)lbl2.textContent='Cantidad'}
  if(unit>0&&cant>0&&fc!=='total'){
    var tot=unit*cant;
    var inp=document.getElementById('HTOT');if(inp)inp.value=tot;
    var info=document.getElementById('HCALCINFO');if(info)info.textContent='$'+Number(unit).toLocaleString('es-CL')+' × '+cant+' = $'+Number(tot).toLocaleString('es-CL');
    var show=document.getElementById('HTOTSHOW');if(show)show.textContent='$'+Number(tot).toLocaleString('es-CL');
  }
  calcSaldo();calcEspTot();
}
function calcSaldo(){
  var tot=parseFloat((document.getElementById('HTOT')||{}).value||0);
  var adl=parseFloat((document.getElementById('HADL')||{}).value||0);
  var sal=document.getElementById('HSAL');if(sal)sal.value=Math.max(0,tot-adl);
  var show=document.getElementById('HTOTSHOW');if(show)show.textContent='$'+Number(tot).toLocaleString('es-CL');
  calcEspTot();
}
function calcEspTot(){
  var tot=parseFloat((document.getElementById('HTOT')||{}).value||0);
  var ESPS_KEYS=[
    {k:'Ingeniería_estructural',hasQty:true},
    {k:'Proyecto_agua_potable',hasQty:false},
    {k:'Proyecto_alcantarillado',hasQty:false},
    {k:'Proyecto_eléctrico',hasQty:false},
    {k:'Proyecto_de_gas',hasQty:false},
    {k:'Topografía',hasQty:false},
    {k:'Fusión_de_predios',hasQty:true},
    {k:'Subdivisión_de_predios',hasQty:true},
  ];
  var espSum=0;
  ESPS_KEYS.forEach(function(ed){
    var cb=document.getElementById('ESP_'+ed.k);
    var vInp=document.getElementById('ESPV_'+ed.k);
    var cInp=document.getElementById('ESPC_'+ed.k);
    var rEl=document.getElementById('ESPR_'+ed.k);
    if(!cb||!vInp)return;
    var val=parseFloat(vInp.value||0);
    var qty=cInp?parseFloat(cInp.value||0):1;
    var subtotal=ed.hasQty?(val*qty):val;
    if(rEl)rEl.textContent='$'+Number(subtotal).toLocaleString('es-CL');
    if(cb.checked)espSum+=subtotal;
  });
  // also sum custom added specialidades
  document.querySelectorAll('#ESPEXT .row input[type=number]').forEach(function(inp){
    var cb=inp.parentElement.querySelector('input[type=checkbox]');
    if(cb&&cb.checked)espSum+=parseFloat(inp.value||0);
  });
  var all=document.getElementById('HTOTALL');
  if(all)all.textContent='$'+Number(tot+espSum).toLocaleString('es-CL');
}

ding:2px 6px;border-radius:4px}@media print{body{padding:16px}}</style>'}
function pdfCab(cfg,titulo,proy,cli,prof){
  var logo=localStorage.getItem('arq_logo')||'';
  var fecha=new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});
  // El membrete muestra: empresa + nombre prof + email prof + teléfono prof
  var email=prof?prof.email:'';
  var tel=prof?prof.telefono:'';
  return '<div class="cab"><div class="cbl">'+
    (logo?'<img src="'+logo+'" class="li">':'')+
    '<div class="en">'+(cfg.empresa||'Estudio de Arquitectura')+'</div>'+
    (prof?'<div class="su">'+prof.nombre+'</div>':'')+
    (email?'<div class="su">'+email+'</div>':'')+
    (tel?'<div class="su">Tel: '+tel+'</div>':'')+
    '</div><div class="cbr">'+
    '<div class="ti">'+titulo+'</div>'+
    '<div class="su">Fecha: '+fecha+'</div>'+
    (proy?'<div class="su">Proyecto: <strong>'+proy+'</strong></div>':'')+
    (cli?'<div class="su">Cliente: <strong>'+cli+'</strong></div>':'')+
    '</div></div><hr class="sp">';
}
function pdfPie(cfg,prof){
  // prof puede venir como parámetro o tomamos el primero de la lista
  var p=prof||(getProfesionales()[0]||null);
  if(!p)return '';
  return '<div style="margin-top:80px;display:flex;justify-content:flex-end">'+
    '<div style="border-top:1px solid #333;min-width:220px;padding-top:6px;font-size:12px;text-align:center">'+
    p.nombre+'<br>'+
    '<span style="color:#555;font-size:11px">'+(p.profesion||'Arquitecto')+'</span>'+
    '</div></div>';
}
function abrirPDF(body){var w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">'+pdfCSS()+'</head><body>'+body+'<scr'+'ipt>window.onload=function(){window.print()}<'+'/scr'+'ipt></body></html>');w.document.close()}

// ── Formato cifra chilena ──
function fmtCLP(val){
  var n=parseInt((val||'').toString().replace(/\./g,'').replace(/[^\d]/g,''))||0;
  return n===0?'':n.toLocaleString('es-CL');
}
function parseCLP(val){return parseInt((val||'').toString().replace(/\./g,'').replace(/[^\d]/g,''))||0}
function presFormatInput(el){
  var raw=parseCLP(el.value);
  el.value=raw===0?'':raw.toLocaleString('es-CL');
}
function presCalcRow(i){
  var qty=parseFloat((document.getElementById('PIQTY'+i)||{}).value||0);
  var uv=parseCLP((document.getElementById('PIUV'+i)||{}).value||'');
  var total=qty>0&&uv>0?qty*uv:uv;
  var tot=document.getElementById('PITOT'+i);
  if(tot)tot.textContent='$'+(total>0?total.toLocaleString('es-CL'):'0');
  if(tot)tot.dataset.val=total;
}
function buildItemRow(i,it){
  it=it||{};
  var tipo=it.tipo||'simple'; // 'simple' | 'unitario'
  var uv=it.uv>0?it.uv.toLocaleString('es-CL'):'';
  var qty=it.qty||'';
  var unidad=it.unidad||'';
  var val=it.valor>0?it.valor.toLocaleString('es-CL'):'';
  return '<div class="pres-row" data-idx="'+i+'" style="background:var(--bg2);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;border:.5px solid var(--bd)">'+
    // Fila 1: descripción + tipo + eliminar
    '<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">'+
    '<input placeholder="Descripción del ítem" class="inp f1" id="PID'+i+'" value="'+(it.desc||'')+'">'+
    '<select id="PITP'+i+'" onchange="presToggleTipo('+i+')" class="inp" style="width:120px;flex-shrink:0">'+
    '<option value="simple"'+(tipo==='simple'?' selected':'')+'>Valor fijo</option>'+
    '<option value="unitario"'+(tipo==='unitario'?' selected':'')+'>Por unidad</option>'+
    '</select>'+
    '<button class="btn btn-sm btn-d" onclick="this.closest(\'.pres-row\').remove();presRecalcTotal()" style="flex-shrink:0">×</button>'+
    '</div>'+
    // Fila 2 SIMPLE: solo valor
    '<div id="PIROW_S'+i+'" style="display:flex;gap:6px;align-items:center'+(tipo==='unitario'?';display:none':'')+'">'+
    '<span style="font-size:12px;color:var(--tx2);flex-shrink:0">$</span>'+
    '<input id="PIV'+i+'" class="inp f1" placeholder="0" value="'+val+'" oninput="presFormatInput(this);presRecalcTotal()" style="text-align:right" inputmode="numeric">'+
    '</div>'+
    // Fila 2 UNITARIO: unidad + valor unitario + cantidad + = total
    '<div id="PIROW_U'+i+'" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap'+(tipo==='simple'?';display:none':'')+'">'+
    '<input id="PIUN'+i+'" class="inp" placeholder="Unidad (m², gl, ud...)" value="'+unidad+'" style="width:110px">'+
    '<span style="font-size:12px;color:var(--tx2);flex-shrink:0">Vr. unit. $</span>'+
    '<input id="PIUV'+i+'" class="inp" placeholder="0" value="'+uv+'" oninput="presFormatInput(this);presCalcRow('+i+');presRecalcTotal()" style="width:120px;text-align:right" inputmode="numeric">'+
    '<span style="font-size:12px;color:var(--tx2);flex-shrink:0">×</span>'+
    '<input id="PIQTY'+i+'" class="inp" type="number" placeholder="Cant." value="'+qty+'" oninput="presCalcRow('+i+');presRecalcTotal()" style="width:80px;text-align:right">'+
    '<span style="font-size:12px;font-weight:600;color:var(--txi);white-space:nowrap" id="PITOT'+i+'">$'+(it.valor>0?it.valor.toLocaleString('es-CL'):'0')+'</span>'+
    '<input type="hidden" id="PITOTH'+i+'" value="'+(it.valor||0)+'">'+
    '</div>'+
    '</div>';
}
function presToggleTipo(i){
  var tp=(document.getElementById('PITP'+i)||{}).value;
  var rs=document.getElementById('PIROW_S'+i);
  var ru=document.getElementById('PIROW_U'+i);
  if(rs)rs.style.display=tp==='unitario'?'none':'flex';
  if(ru)ru.style.display=tp==='simple'?'none':'flex';
  presRecalcTotal();
}
function presRecalcTotal(){
  var rows=document.querySelectorAll('.pres-row');
  var total=0;
  rows.forEach(function(row){
    var i=row.dataset.idx;
    var tp=(document.getElementById('PITP'+i)||{}).value||'simple';
    if(tp==='unitario'){
      var qty=parseFloat((document.getElementById('PIQTY'+i)||{}).value||0);
      var uv=parseCLP((document.getElementById('PIUV'+i)||{}).value||'');
      total+=qty>0&&uv>0?qty*uv:uv;
    } else {
      total+=parseCLP((document.getElementById('PIV'+i)||{}).value||'');
    }
  });
  var tEl=document.getElementById('PRTOTAL');
  if(tEl)tEl.textContent='Total neto: $'+total.toLocaleString('es-CL');
}
// ── Notas predefinidas ──
function getNotasPred(){try{return JSON.parse(localStorage.getItem('arq_notas_pred')||'[]')}catch(e){return[]}}
function saveNotasPred(arr){localStorage.setItem('arq_notas_pred',JSON.stringify(arr));clearTimeout(window._arqSaveTimer);window._arqSaveTimer=setTimeout(function(){_arqPushToFirebase()},800)}
function renderNotasPred(){
  var notas=getNotasPred();
  var c=document.getElementById('NOTAS_LIST');if(!c)return;
  if(notas.length===0){c.innerHTML='<div class="tsm tx2">Sin notas guardadas aún. Guarda una desde una cotización usando el botón 💾.</div>';return}
  c.innerHTML=notas.map(function(n,i){
    var preview=n.replace(/<[^>]+>/g,'').substring(0,80)+(n.replace(/<[^>]+>/g,'').length>80?'…':'');
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);margin-bottom:6px">'+
      '<div style="flex:1;font-size:12px;color:var(--tx2)">'+preview+'</div>'+
      '<button class="btn btn-sm btn-d" onclick="presEliminarNota('+i+')">×</button>'+
      '</div>';
  }).join('');
}

// ── Editor de texto con formato para presupuestos ──
function presEditorHTML(id,val,minH){
  minH=minH||80;
  // Los botones usan onmousedown+preventDefault para no perder el foco del contenteditable
  var btn=function(cmd,label,style){
    return '<button type="button" onmousedown="event.preventDefault();presCmd(\''+id+'\',\''+cmd+'\')" title="'+label+'" style="background:none;border:.5px solid var(--bd);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:12px;'+( style||'')+';min-width:28px">'+label+'</button>';
  };
  return '<div style="border:.5px solid var(--bd2);border-radius:var(--r);overflow:hidden">'+
    '<div style="display:flex;gap:2px;padding:4px 6px;background:var(--bg2);border-bottom:.5px solid var(--bd);flex-wrap:wrap;align-items:center">'+
    btn('bold','B','font-weight:700')+
    btn('italic','I','font-style:italic')+
    btn('underline','U','text-decoration:underline')+
    '<div style="width:1px;height:16px;background:var(--bd);margin:0 2px"></div>'+
    btn('insertUnorderedList','• Lista','')+
    btn('insertOrderedList','1. Núm.','')+
    '<div style="width:1px;height:16px;background:var(--bd);margin:0 2px"></div>'+
    '<button type="button" onmousedown="event.preventDefault();var e=document.getElementById(\''+id+'\');if(e){e.innerHTML=\'\';e.focus()}" style="background:none;border:.5px solid var(--bdd);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:11px;color:var(--txd)">✕</button>'+
    '</div>'+
    '<div id="'+id+'" contenteditable="true" style="min-height:'+minH+'px;padding:8px 10px;font-size:13px;outline:none;background:var(--bg);line-height:1.6;word-break:break-word">'+( val||'')+'</div>'+
    '</div>';
}
function presCmd(id,cmd){
  var el=document.getElementById(id);if(!el)return;
  el.focus();
  document.execCommand(cmd,false,null);
}
function presGetEditor(id){var el=document.getElementById(id);return el?el.innerHTML.trim():''}

// ── Widget de notas guardadas ──
function presNotasWidget(targetId,notas){
  if(!notas||!notas.length)return '';
  return '<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">'+
    notas.map(function(n,i){
      var label=n.length>30?n.substring(0,30)+'…':n;
      return '<span onclick="presInsertNota(\''+targetId+'\','+i+')" style="background:var(--bg2);border:.5px solid var(--bd);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;color:var(--tx2)" title="'+n+'">'+label+'</span>';
    }).join('')+
    '</div>';
}
function presInsertNota(targetId,idx){
  var notas=getNotasPred();var nota=notas[idx];if(!nota)return;
  var el=document.getElementById(targetId);if(!el)return;
  el.focus();
  if(el.innerHTML&&el.innerHTML.trim())el.innerHTML+='\n';
  document.execCommand('insertHTML',false,nota);
}
function presGuardarNota(sourceId){
  var el=document.getElementById(sourceId);if(!el)return;
  var txt=el.innerText.trim();if(!txt){alert('Escribe algo primero');return}
  var notas=getNotasPred();
  if(notas.indexOf(txt)>=0){alert('Esta nota ya está guardada');return}
  notas.push(txt);saveNotasPred(notas);
  // Re-render widgets
  var w=document.getElementById('NOTAW_'+sourceId);
  if(w)w.innerHTML=presNotasWidget(sourceId,notas);
  alert('✓ Nota guardada');
}
function presEliminarNota(idx){
  if(!confirm('¿Eliminar esta nota guardada?'))return;
  var notas=getNotasPred();notas.splice(idx,1);saveNotasPred(notas);vConf();
}

    '<div class="fld"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+

function addItemPres(tipo){
  var c=document.getElementById('PRIT');
  var i=c.querySelectorAll('.pres-row').length;
  c.insertAdjacentHTML('beforeend',buildItemRow(i,{tipo:tipo||'simple'}));
  presRecalcTotal();
}
function savePres(id,isNew){
  var ps=rdb('presupuestos',[]);var clis=rdb('clientes',[]);
  var g=function(i){return(document.getElementById(i)||{}).value||''};
  var cid=g('PRCL');var cl=clis.find(function(c){return c.id===cid});
  var firmaCliente=(document.getElementById('PRFIRMA')||{}).checked!==false;
  var rows=document.querySelectorAll('#PRIT .pres-row');
  var items=Array.from(rows).map(function(row){
    var i=row.dataset.idx;
    var desc=(document.getElementById('PID'+i)||{}).value||'';
    var tp=(document.getElementById('PITP'+i)||{}).value||'simple';
    if(!desc)return null;
    if(tp==='unitario'){
      var uv=parseCLP((document.getElementById('PIUV'+i)||{}).value||'');
      var qty=parseFloat((document.getElementById('PIQTY'+i)||{}).value||0);
      var unidad=(document.getElementById('PIUN'+i)||{}).value||'';
      var total=qty>0&&uv>0?qty*uv:uv;
      return{desc:desc,tipo:'unitario',unidad:unidad,uv:uv,qty:qty,valor:total};
    } else {
      var val=parseCLP((document.getElementById('PIV'+i)||{}).value||'');
      return{desc:desc,tipo:'simple',valor:val};
    }
  }).filter(Boolean);
  var upd={id:id,clienteId:cid,cliente:cl?cl.nombre:'',
    desc:presGetEditor('PRDE'),items:items,
    nota:presGetEditor('PRNO'),
    firmaCliente:firmaCliente,fecha:g('PRFE'),
    condPago:presGetEditor('PRCOND'),
    notaRecep:presGetEditor('PRRECEP')};
  if(isNew)ps.push(upd);else{var i=ps.findIndex(function(x){return x.id===id});if(i>=0)ps[i]=upd}
  wdb('presupuestos',ps);closeMod();vPres();
}
function printPres(id){
  var profs=getProfesionales();
  var bancos=getBancos();
  var cfg=rdb('config',{empresa:'',arquitecto:'',profesion:'',email:'',telefono:''});
  // Armar sección profesionales — solo de la lista
  var profOpts='';
  if(profs.length>0){
    profOpts=profs.map(function(pr,i){
      return '<div onclick="printPresSelProf('+i+',this)" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:.5px solid var(--bd);border-radius:var(--r);cursor:pointer;margin-bottom:6px;transition:all .15s" onmouseover="this.style.background=\'var(--bgi)\'" onmouseout="if(!this.classList.contains(\'sel-prof\'))this.style.background=\'\'">'+
        '<input type="radio" name="prof_sel" value="'+i+'" style="width:16px;height:16px;accent-color:var(--txi)">'+
        '<div style="flex:1">'+
        '<div style="font-weight:600;font-size:13px">'+pr.nombre+'</div>'+
        '<div class="tsm tx2">'+pr.profesion+'</div>'+
        '</div></div>';
    }).join('');
  }
  // Armar sección cuentas bancarias
  var bancoOpts='';
  if(bancos.length>0){
    bancoOpts=bancos.map(function(b,i){
      var det=[b.banco,b.tipoCuenta,b.numCuenta?'N° '+b.numCuenta:''].filter(Boolean).join(' · ');
      return '<div onclick="printPresSelBanco2('+i+',this)" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:.5px solid var(--bd);border-radius:var(--r);cursor:pointer;margin-bottom:6px;transition:all .15s" onmouseover="this.style.background=\'var(--bgi)\'" onmouseout="if(!this.classList.contains(\'sel-bco\'))this.style.background=\'\'">'+
        '<input type="radio" name="bco_sel" value="'+i+'" style="width:16px;height:16px;accent-color:var(--txi)">'+
        '<div style="flex:1"><div style="font-weight:600;font-size:13px">'+b.nombre+'</div>'+
        '<div class="tsm tx2">'+det+'</div></div></div>';
    }).join('');
  }

  // Si no hay ni profesionales ni cuentas, imprimir directo con config
  if(!profOpts&&!bancoOpts){doPrintPres(id,-1,-1);return}

  document.getElementById('MOD').innerHTML=
    '<div class="mov" onclick="if(event.target===this)closeMod()">'+
    '<div class="modal" style="max-width:480px">'+
    '<div class="mhdr"><div class="mttl">📄 Opciones de impresión</div><button class="xbtn" onclick="closeMod()">×</button></div>'+
    // Sección profesional
    (profOpts?
      '<div class="sec-ttl">👷 Profesional que firma</div>'+
      '<div id="PROF_OPTS" style="margin-bottom:12px">'+profOpts+'</div>'
    :'')+
    // Sección cuenta bancaria
    (bancoOpts?
      '<div class="sec-ttl">🏦 Cuenta bancaria (opcional)</div>'+
      '<div id="BCO_OPTS" style="margin-bottom:12px">'+bancoOpts+'</div>'
    :'')+
    '<div class="hr"></div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+
    '<button class="btn btn-sm" onclick="doPrintPres(\''+id+'\',-2,-1)">Sin profesional ni banco</button>'+
    '<div style="display:flex;gap:8px">'+
    '<button class="btn" onclick="closeMod()">Cancelar</button>'+
    '<button class="btn btn-p" onclick="doPrintPresConfirm(\''+id+'\')">📄 Imprimir PDF</button>'+
    '</div></div>'+
    '</div></div>';
}
function printPresSelProf(idx,el){
  var rb=el.querySelector('input[type=radio]');if(rb)rb.checked=true;
  document.querySelectorAll('#PROF_OPTS > div').forEach(function(d){d.style.background='';d.style.borderColor='var(--bd)';d.classList.remove('sel-prof')});
  el.style.background='var(--bgi)';el.style.borderColor='var(--bdi)';el.classList.add('sel-prof');
}
function printPresSelBanco2(idx,el){
  var rb=el.querySelector('input[type=radio]');if(rb)rb.checked=true;
  document.querySelectorAll('#BCO_OPTS > div').forEach(function(d){d.style.background='';d.style.borderColor='var(--bd)';d.classList.remove('sel-bco')});
  el.style.background='var(--bgi)';el.style.borderColor='var(--bdi)';el.classList.add('sel-bco');
}
function doPrintPresConfirm(id){
  var profSel=document.querySelector('#PROF_OPTS input[name=prof_sel]:checked');
  var bcoSel=document.querySelector('#BCO_OPTS input[name=bco_sel]:checked');
  var profIdx=profSel?parseInt(profSel.value):-2; // -2 = sin profesional, -1 = cfg, >=0 = lista
  var bcoIdx=bcoSel?parseInt(bcoSel.value):-1;
  doPrintPres(id,profIdx,bcoIdx);
}
function doPrintPres(id,profIdx,bancoIdx){
  var ps=rdb('presupuestos',[]);var p=ps.find(function(x){return x.id===id});if(!p)return;
  var cfg=rdb('config',{empresa:'',arquitecto:'',profesion:'',email:'',telefono:''});
  var bancos=getBancos();
  var profs=getProfesionales();
  // Resolver profesional — solo de la lista
  var prof=null;
  if(profIdx>=0)prof=profs[profIdx];
  var banco=bancoIdx>=0?bancos[bancoIdx]:null;
  closeMod();
  var tot=(p.items||[]).reduce(function(a,x){return a+parseFloat(x.valor||0)},0);
  var body=pdfCab(cfg,'Presupuesto / Cotización','',p.cliente||'',prof);
  body+='<div style="margin-bottom:16px;font-size:13px;line-height:1.6">'+(p.desc||'')+'</div>';

  var hasUnitario=(p.items||[]).some(function(it){return it.tipo==='unitario'});
  if(hasUnitario){
    body+='<table><thead><tr>'+
      '<th style="width:38%">Descripción</th>'+
      '<th style="text-align:center">Unidad</th>'+
      '<th style="text-align:right">Cantidad</th>'+
      '<th style="text-align:right">Vr. Unitario</th>'+
      '<th style="text-align:right">Total</th>'+
      '</tr></thead><tbody>';
    (p.items||[]).forEach(function(it){
      if(it.tipo==='unitario'){
        body+='<tr><td>'+it.desc+'</td><td style="text-align:center">'+(it.unidad||'')+'</td>'+
          '<td style="text-align:right">'+Number(it.qty||0).toLocaleString('es-CL')+'</td>'+
          '<td style="text-align:right">$'+Number(it.uv||0).toLocaleString('es-CL')+'</td>'+
          '<td style="text-align:right;font-weight:600">$'+Number(it.valor||0).toLocaleString('es-CL')+'</td></tr>';
      } else {
        body+='<tr><td>'+it.desc+'</td><td colspan="3" style="text-align:center;color:#888;font-size:11px">Global</td>'+
          '<td style="text-align:right;font-weight:600">$'+Number(it.valor||0).toLocaleString('es-CL')+'</td></tr>';
      }
    });
    body+='<tr style="font-weight:bold;font-size:14px"><td colspan="4" style="text-align:right;border-top:2px solid #222;padding-top:8px">TOTAL NETO</td><td style="text-align:right;border-top:2px solid #222;padding-top:8px">$'+Number(tot).toLocaleString('es-CL')+'</td></tr>';
  } else {
    body+='<table><thead><tr><th style="width:75%">Descripción</th><th style="text-align:right">Valor</th></tr></thead><tbody>';
    (p.items||[]).forEach(function(it){
      body+='<tr><td>'+it.desc+'</td><td style="text-align:right;font-weight:600">$'+Number(it.valor||0).toLocaleString('es-CL')+'</td></tr>';
    });
    body+='<tr style="font-weight:bold;font-size:14px"><td style="text-align:right;border-top:2px solid #222;padding-top:8px">TOTAL NETO</td><td style="text-align:right;border-top:2px solid #222;padding-top:8px">$'+Number(tot).toLocaleString('es-CL')+'</td></tr>';
  }
  body+='</tbody></table>';
  if(p.nota)body+='<div style="color:#666;font-size:11px;margin-top:14px;border-top:1px solid #ddd;padding-top:10px;line-height:1.5">'+p.nota+'</div>';
  if(p.condPago)body+='<div style="font-size:12px;margin-top:12px;line-height:1.5"><strong>Condiciones de pago:</strong> '+p.condPago+'</div>';
  if(p.notaRecep)body+='<div style="font-size:12px;margin-top:8px;line-height:1.5">'+p.notaRecep+'</div>';
  if(banco){
    body+='<div style="margin-top:20px;padding:12px 16px;background:#f9f9f9;border:1px solid #e8e8e8;border-radius:6px;font-size:12px">';
    body+='<div style="font-weight:700;margin-bottom:6px;font-size:13px">Datos para transferencia</div>';
    if(banco.nombre)body+='<div><strong>Cuenta:</strong> '+banco.nombre+'</div>';
    if(banco.banco)body+='<div><strong>Banco:</strong> '+banco.banco+'</div>';
    if(banco.tipoCuenta)body+='<div><strong>Tipo:</strong> '+banco.tipoCuenta+'</div>';
    if(banco.numCuenta)body+='<div><strong>N° cuenta:</strong> '+banco.numCuenta+'</div>';
    if(banco.rut)body+='<div><strong>RUT:</strong> '+banco.rut+'</div>';
    if(banco.email)body+='<div><strong>Email:</strong> '+banco.email+'</div>';
    body+='</div>';
  }
  // ── Firmas ──
  var firmaCliente=p.firmaCliente!==false;
  if(prof){
    var profBlock='<div style="border-top:1px solid #333;min-width:220px;padding-top:6px;font-size:12px;text-align:center">'+
      prof.nombre+'<br>'+
      '<span style="color:#555;font-size:11px">'+( prof.profesion||'Arquitecto')+'</span>'+
      '</div>';
      '</div>';
    if(firmaCliente){
      body+='<div style="margin-top:80px;display:flex;justify-content:space-between;align-items:flex-end">'+
        profBlock+
        '<div style="border-top:1px solid #333;min-width:220px;padding-top:6px;font-size:12px;text-align:center">'+
          (p.cliente||'Cliente')+'<br><span style="color:#555;font-size:11px">Firma conforme</span>'+
        '</div></div>';
    } else {
      body+='<div style="margin-top:80px;display:flex;justify-content:flex-end">'+profBlock+'</div>';
    }
  } else if(firmaCliente){
    body+='<div style="margin-top:80px;display:flex;justify-content:flex-end">'+

function vHon(){
  var ps=rdb('proyectos',[]);
  var conH=ps.filter(function(p){return p.totalHonorarios});
  var totG=conH.reduce(function(a,p){return a+parseFloat(p.totalHonorarios||0)},0);
  var totP=ps.filter(function(p){return p.estadoPago==='pendiente'}).reduce(function(a,p){return a+parseFloat(p.saldo||p.totalHonorarios||0)},0);
  var totC=ps.filter(function(p){return p.estadoPago==='pagado'}).reduce(function(a,p){return a+parseFloat(p.totalHonorarios||0)},0);
  var totCu=ps.filter(function(p){return p.estadoPago==='cuotas'}).reduce(function(a,p){return a+parseFloat(p.totalHonorarios||0)},0);
  var byMonth={};
  conH.forEach(function(p){if(!p.fechaInicio)return;var d=new Date(p.fechaInicio);if(isNaN(d.getTime()))return;var k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');byMonth[k]=(byMonth[k]||0)+parseFloat(p.totalHonorarios||0)});
  var months=Object.keys(byMonth).sort().slice(-12);
  var maxVal=months.reduce(function(a,k){return Math.max(a,byMonth[k])},1);
  var bars=months.map(function(k){var v=byMonth[k];var pct=Math.round(v/maxVal*100);return'<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px"><div style="flex:1;display:flex;align-items:flex-end;width:100%;padding:0 2px"><div style="background:var(--txi);border-radius:3px 3px 0 0;width:100%;height:'+pct+'%;min-height:4px" title="'+k+': $'+Number(v).toLocaleString('es-CL')+'"></div></div><div class="tsm" style="font-size:9px;text-align:center;color:var(--tx3);margin-top:4px;white-space:nowrap">'+k.slice(5)+'</div></div>'}).join('');
  var rows=conH.length===0?'<tr><td colspan="7"><div class="empty">Sin honorarios</div></td></tr>':
    conH.map(function(p){return'<tr><td style="font-weight:600;cursor:pointer" onclick="editProy(\'+'+p.id+'+\')">'+(p.nombre||'—')+'</td><td>'+(p.cliente||'—')+'</td><td style="font-weight:600">$'+fmt(p.totalHonorarios)+'</td><td>$'+fmt(p.adelanto)+'</td><td>$'+fmt(p.saldo)+'</td><td>'+(p.formaCobro==='m2'?'Por m²':p.formaCobro==='lote'?'Por lote':p.formaCobro==='total'?'Total acordado':'Otro')+'</td><td><span class="badge b-'+(p.estadoPago||'pendiente')+'">'+stPago(p.estadoPago)+'</span></td></tr>'}).join('');
  document.getElementById('MAIN').innerHTML=
    '<div class="g4 mb2">'+
    '<div class="stat"><div class="stat-lbl">Total general</div><div class="stat-val">$'+fmt(totG)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">Pendiente</div><div class="stat-val" style="color:var(--txd)">$'+fmt(totP)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">En cuotas</div><div class="stat-val" style="color:var(--txw)">$'+fmt(totCu)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">Cobrado</div><div class="stat-val" style="color:var(--txs)">$'+fmt(totC)+'</div></div></div>'+
    (months.length>0?'<div class="card mb2"><div class="sec-ttl">Ingresos por mes</div><div style="display:flex;align-items:flex-end;gap:3px;height:100px;padding-bottom:28px">'+bars+'</div></div>':'')+
    '<div class="card"><div class="twrap"><table><thead><tr><th>Proyecto</th><th>Cliente</th><th>Total</th><th>Adelanto</th><th>Saldo</th><th>Forma cobro</th><th>Estado</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function uploadLogo(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){
  localStorage.setItem('arq_logo',e.target.result);
  loadLogo();vConf();

  showSyncARQ('saving');

function loadLogo(){var logo=localStorage.getItem('arq_logo');var img=document.getElementById('LOGO');var ph=document.getElementById('LOGOPH');if(logo&&img&&ph){img.src=logo;img.style.display='block';ph.style.display='none'}else if(img&&ph){img.style.display='none';ph.style.display=''}}
function sincLogo(){
  /* Exportar logo como archivo para cargarlo en otro dispositivo */
  var logo=localStorage.getItem('arq_logo');
  if(!logo){alert('No hay logo cargado en este dispositivo. Ve a Configuración y sube el logo.');return;}
  var a=document.createElement('a');
  var blob=new Blob([logo],{type:'text/plain'});
  a.href=URL.createObjectURL(blob);
  a.download='arq-logo-backup.txt';
  a.click();
}
function cargarLogoDesdeTexto(txt){
  if(txt&&txt.startsWith('data:')){
    localStorage.setItem('arq_logo',txt);
    loadLogo();
    alert('✓ Logo cargado correctamente');
  }
}
function updateUSel(){var s=document.getElementById('USEL');if(!s)return;s.options[0].text=localStorage.getItem('arq_u1_UN')||'Usuario 1';s.options[1].text=localStorage.getItem('arq_u2_UN')||'Usuario 2'}
function exportData(){
  var data={};
  ['proyectos','clientes','tramites','presupuestos','config'].forEach(function(k){
    data['u1_'+k]=JSON.parse(localStorage.getItem('arq_u1_'+k)||'null');
    data['u2_'+k]=JSON.parse(localStorage.getItem('arq_u2_'+k)||'null');
  });
  data.logo=localStorage.getItem('arq_logo');
  data.u1_UN=localStorage.getItem('arq_u1_UN');data.u2_UN=localStorage.getItem('arq_u2_UN');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download='arqgestion_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function importData(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);['proyectos','clientes','tramites','presupuestos','config'].forEach(function(k){if(d['u1_'+k])localStorage.setItem('arq_u1_'+k,JSON.stringify(d['u1_'+k]));if(d['u2_'+k])localStorage.setItem('arq_u2_'+k,JSON.stringify(d['u2_'+k]))});if(d.logo)localStorage.setItem('arq_logo',d.logo);if(d.u1_UN)localStorage.setItem('arq_u1_UN',d.u1_UN);if(d.u2_UN)localStorage.setItem('arq_u2_UN',d.u2_UN);alert('✓ Datos importados correctamente');go(CV)}catch(err){alert('Error al importar. Verifica el archivo.')}};r.readAsText(f)}


// ── Client inline create/edit ──
function cliMode(mode){
  var sel=document.getElementById('TC_SEL');
  var form=document.getElementById('TC_FORM');
  var lbl=document.getElementById('TC_FORMLBL');
  var bsel=document.getElementById('CBTN_SEL');
  var bnew=document.getElementById('CBTN_NEW');
  var bedit=document.getElementById('CBTN_EDIT');
  if(mode==='sel'){
    if(sel)sel.classList.remove('hidden');
    if(form)form.classList.add('hidden');
    if(bsel)bsel.classList.add('btn-p');if(bnew)bnew.classList.remove('btn-p');
  } else if(mode==='new'){
    if(sel)sel.classList.add('hidden');
    if(form)form.classList.remove('hidden');
    if(lbl){lbl.textContent='Completa los datos del nuevo cliente';lbl.style.background='var(--bgs)';lbl.style.color='var(--txs)'}
    if(bsel)bsel.classList.remove('btn-p');if(bnew)bnew.classList.add('btn-p');
    // clear form
    ['CLI_N','CLI_R','CLI_T','CLI_E','CLI_D','CLI_O'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=''});
    var idEl=document.getElementById('CLI_ID');if(idEl)idEl.value='';
    var rl=document.getElementById('CLI_RL');if(rl)rl.value='cliente';
  } else if(mode==='edit'){
    var cid=(document.getElementById('PC2')||{}).value||(document.getElementById('PC')||{}).value||'';
    if(!cid){alert('Selecciona un cliente primero');return}
    var clis=rdb('clientes',[]);
    var cl=clis.find(function(x){return x.id===cid});
    if(!cl)return;
    if(sel)sel.classList.add('hidden');
    if(form)form.classList.remove('hidden');
    if(lbl){lbl.textContent='Editando: '+cl.nombre;lbl.style.background='var(--bgw)';lbl.style.color='var(--txw)'}
    if(bsel)bsel.classList.remove('btn-p');if(bedit)bedit.classList.add('btn-p');
    var idEl=document.getElementById('CLI_ID');if(idEl)idEl.value=cl.id;
    var nEl=document.getElementById('CLI_N');if(nEl)nEl.value=cl.nombre||'';
    var rEl=document.getElementById('CLI_R');if(rEl)rEl.value=cl.rut||'';
    var tEl=document.getElementById('CLI_T');if(tEl)tEl.value=cl.telefono||'';
    var eEl=document.getElementById('CLI_E');if(eEl)eEl.value=cl.email||'';
    var dEl=document.getElementById('CLI_D');if(dEl)dEl.value=cl.direccion||'';
    var oEl=document.getElementById('CLI_O');if(oEl)oEl.value=cl.observaciones||'';
    var rlEl=document.getElementById('CLI_RL');if(rlEl)rlEl.value=cl.rolCliente||'cliente';
  }
}
function saveCliInline(){
  var g=function(id){return(document.getElementById(id)||{}).value||''};
  var nombre=g('CLI_N').trim();
  if(!nombre){alert('El nombre es obligatorio');return}
  var clis=rdb('clientes',[]);
  var existingId=g('CLI_ID');
  var isNew=!existingId;
  var newId=existingId||uid();
  var upd={id:newId,nombre:nombre,rut:g('CLI_R'),telefono:g('CLI_T'),email:g('CLI_E'),direccion:g('CLI_D'),rolCliente:g('CLI_RL')||'cliente',observaciones:g('CLI_O'),extraCampos:[]};
  if(isNew){clis.push(upd)}else{var idx=clis.findIndex(function(x){return x.id===newId});if(idx>=0)clis[idx]=upd}
  wdb('clientes',clis);
  // Update selects with new client
  var opt='<option value="'+newId+'" selected>'+nombre+(upd.rut?' · '+upd.rut:'')+'</option>';
  var pc2=document.getElementById('PC2');
  var pc=document.getElementById('PC');
  if(pc2){
    var existing=pc2.querySelector('option[value="'+newId+'"]');
    if(existing){existing.textContent=nombre+(upd.rut?' · '+upd.rut:'');pc2.value=newId}
    else{pc2.insertAdjacentHTML('beforeend','<option value="'+newId+'">'+nombre+(upd.rut?' · '+upd.rut:'')+'</option>');pc2.value=newId}
  }
  if(pc){
    var existing2=pc.querySelector('option[value="'+newId+'"]');
    if(existing2){existing2.textContent=nombre+(upd.rut?' · '+upd.rut:'');pc.value=newId}
    else{pc.insertAdjacentHTML('beforeend','<option value="'+newId+'">'+nombre+(upd.rut?' · '+upd.rut:'')+'</option>');pc.value=newId}
  }
  // Show preview
  var prev=document.getElementById('CLIPREV');if(prev)prev.innerHTML=buildCliPrev(upd);
  // Switch back to select mode
  cliMode('sel');
  // Add edit button if it didn't exist
  var bedit=document.getElementById('CBTN_EDIT');
  if(!bedit){
    var bnew=document.getElementById('CBTN_NEW');
    if(bnew)bnew.insertAdjacentHTML('afterend','<button id="CBTN_EDIT" class="btn btn-sm" onclick="cliMode(\'edit\')">✏️ Editar seleccionado</button>');
  }
  var lbl=document.getElementById('TC_FORMLBL');
  if(lbl)lbl.textContent='✓ Cliente '+(isNew?'creado':'actualizado')+' y vinculado correctamente';
}

// ── tab/modal helpers ──
function swTab(el,id){
  document.querySelectorAll('.tabs .tab').forEach(function(t){t.classList.remove('on')});el.classList.add('on');
  document.querySelectorAll('.modal [id^=T]').forEach(function(d){if(d.classList.contains('tab')||d.classList.contains('tabs'))return;d.classList.add('hidden')});
  var target=document.getElementById(id);if(target)target.classList.remove('hidden');
}
